<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="build-version" content="20260709-fixed-top-menu-shell" />
  <title>SSAKA E-BIZ Studio</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 100%; height: 100%; }
    body {
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, "Pretendard", "Segoe UI", sans-serif;
      background: #f8fafc;
      color: #111827;
      overflow: hidden;
    }
    .ssaka-shell-header {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: 74px;
      z-index: 1000;
      border-bottom: 1px solid #e5e7eb;
      background: rgba(255,255,255,0.96);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
      padding: 0 25px;
    }
    .logo {
      font-size: 20px;
      font-weight: 900;
      letter-spacing: -0.04em;
      color: #111827;
      text-decoration: none;
      white-space: nowrap;
    }
    .menu {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      flex-wrap: wrap;
      gap: 10px;
    }
    .menu button {
      min-height: 46px;
      padding: 0 18px;
      border-radius: 999px;
      border: 1px solid #e5e7eb;
      background: #fff;
      color: #374151;
      font-size: 15px;
      font-weight: 800;
      letter-spacing: -0.03em;
      cursor: pointer;
      box-shadow: 0 1px 2px rgba(15,23,42,.02);
      transition: all .15s ease;
      font-family: inherit;
    }
    .menu button:hover,
    .menu button.active {
      background: #111827;
      border-color: #111827;
      color: #fff;
    }
    .frame-wrap {
      position: fixed;
      left: 0;
      right: 0;
      top: 74px;
      bottom: 0;
      background: #f8fafc;
    }
    iframe {
      width: 100%;
      height: 100%;
      border: 0;
      display: block;
      background: #fff;
    }
    .loading {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #6b7280;
      font-size: 14px;
      font-weight: 700;
      pointer-events: none;
      background: #f8fafc;
      transition: opacity .2s ease;
    }
    .loading.hide { opacity: 0; }
    @media (max-width: 860px) {
      body { overflow: auto; }
      .ssaka-shell-header {
        height: auto;
        min-height: 74px;
        align-items: flex-start;
        flex-direction: column;
        padding: 18px 20px;
      }
      .menu { width: 100%; flex-direction: column; align-items: stretch; }
      .menu button { width: 100%; }
      .frame-wrap { top: 250px; }
    }
  </style>
</head>
<body>
  <header class="ssaka-shell-header">
    <a class="logo" href="./index.html">SSAKA E-BIZ STUDIO</a>
    <nav class="menu" aria-label="SSAKA E-BIZ Studio Menu">
      <button type="button" data-tool="ghost1" data-src="./E-BIZ_고스트변환페이지1.html">고스트 페이지 1</button>
      <button type="button" data-tool="ghost2" data-src="./E-BIZ_고스트변환페이지2.html">고스트 페이지 2</button>
      <button type="button" data-tool="banner" data-src="./banner-studio.html">롤링배너 제작</button>
      <button type="button" data-tool="editorial" data-src="./editorial-detail-page.html">웹 상세페이지</button>
    </nav>
  </header>

  <main class="frame-wrap">
    <div id="loading" class="loading">페이지 불러오는 중...</div>
    <iframe id="toolFrame" title="SSAKA E-BIZ Studio Tool" src="./E-BIZ_고스트변환페이지1.html"></iframe>
  </main>

  <script>
    const frame = document.getElementById('toolFrame');
    const loading = document.getElementById('loading');
    const buttons = Array.from(document.querySelectorAll('[data-tool]'));

    const tools = {
      ghost1: './E-BIZ_고스트변환페이지1.html',
      ghost2: './E-BIZ_고스트변환페이지2.html',
      banner: './banner-studio.html',
      editorial: './editorial-detail-page.html'
    };

    function activate(tool, pushHash = true) {
      const key = tools[tool] ? tool : 'ghost1';
      buttons.forEach(btn => btn.classList.toggle('active', btn.dataset.tool === key));
      loading.classList.remove('hide');
      frame.src = tools[key];
      if (pushHash) history.replaceState(null, '', '#' + key);
    }

    buttons.forEach(btn => {
      btn.addEventListener('click', () => activate(btn.dataset.tool));
    });

    frame.addEventListener('load', () => {
      loading.classList.add('hide');
    });

    const initial = (location.hash || '').replace('#', '') || 'ghost1';
    activate(initial, false);
  </script>
</body>
</html>
