<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SSAKA Banner Studio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f7f9fc;
            color: #0f172a;
        }
    </style>
    <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@^19.2.4",
        "react-dom/": "https://esm.sh/react-dom@^19.2.4/",
        "react/": "https://esm.sh/react@^19.2.4/",
        "@google/genai": "https://esm.sh/@google/genai@^1.40.0"
      }
    }
    </script>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel" data-type="module" data-presets="react,typescript">
import React, { useState, useEffect } from 'react';
import ReactDOM from 'react-dom/client';
import { GoogleGenAI } from '@google/genai';

/* ============================================================
 * API Key 저장 (standalone HTML — localStorage 사용)
 * ============================================================ */
const API_KEY_STORAGE = 'banner_studio_api_key';
const getStoredKey = () => localStorage.getItem(API_KEY_STORAGE) || '';

/* ============================================================
 * geminiService
 * ============================================================ */
const searchAndConceptualize = async (config, apiKey) => {
  const ai = new GoogleGenAI({ apiKey });

  const prompt = `
    Analyze the product name/code: "${config.productCode}".
    Additional instructions: "${config.command}".

    ${config.referenceImage ? "A reference image has been provided. Analyze its style, subject, and composition." : ""}

    1. Search for information about this product to understand its target audience, aesthetics, and key features.
    2. Create a detailed visual prompt for a high-end website banner (${config.aspectRatio} aspect).
    3. The concept should be modern, professional, and visually striking.
    ${config.referenceImage ? "4. CRITICAL: The concept MUST complement and preserve the style and subject of the attached reference image." : ""}
    5. Provide a textual description of the banner concept first, followed by a specific prompt for an image generator.
  `;

  const contents = {
    parts: [{ text: prompt }]
  };

  if (config.referenceImage) {
    contents.parts.push({
      inlineData: {
        mimeType: 'image/png',
        data: config.referenceImage.split(',')[1],
      }
    });
  }

  const response = await ai.models.generateContent({
    model: 'gemini-3-flash-preview',
    contents,
    config: {
      tools: [{ googleSearch: {} }],
    },
  });

  const concept = response.text || "Professional product showcase banner.";
  const groundingChunks = response.candidates?.[0]?.groundingMetadata?.groundingChunks || [];

  const sources = groundingChunks
    .filter((chunk) => chunk.web)
    .map((chunk) => ({
      title: chunk.web.title,
      uri: chunk.web.uri,
    }));

  return { concept, sources };
};

const generateBannerImage = async (config, concept, apiKey) => {
  const ai = new GoogleGenAI({ apiKey });

  const basePrompt = `High-resolution professional website banner for: ${concept}. Cinema 4D render style, 8k resolution, photorealistic, premium marketing aesthetic. Use negative space for text placement.`;

  const contents = {
    parts: [
      {
        text: config.referenceImage
          ? `STRICT INSTRUCTION: Preserve the attached image exactly as it is. Do not change the subject, background, or core elements of the provided image. Enhance it into a professional banner following this concept: ${concept}. Maintain the original image's integrity while expanding or refining the environment around it.`
          : basePrompt
      }
    ]
  };

  if (config.referenceImage) {
    contents.parts.unshift({
      inlineData: {
        mimeType: 'image/png',
        data: config.referenceImage.split(',')[1],
      }
    });
  }

  const response = await ai.models.generateContent({
    model: 'gemini-3.1-flash-image-preview',
    contents,
    config: {
      imageConfig: {
        aspectRatio: config.aspectRatio,
        imageSize: config.size
      }
    }
  });

  for (const part of response.candidates?.[0]?.content?.parts || []) {
    if (part.inlineData) {
      return `data:image/png;base64,${part.inlineData.data}`;
    }
  }

  throw new Error("No image data returned from Gemini Image model.");
};

/* ============================================================
 * ApiKeyDialog — standalone HTML 버전 (키 직접 입력)
 * ============================================================ */
const ApiKeyDialog = ({ onSelect, onCancel }) => {
  const [manualKey, setManualKey] = useState(getStoredKey());

  const handleSave = () => {
    const key = manualKey.trim();
    if (!key) return;
    localStorage.setItem(API_KEY_STORAGE, key);
    onSelect(key);
  };

  return (
    <div className="fixed inset-0 bg-slate-900/40 backdrop-blur-md flex items-center justify-center z-50 p-4">
      <div className="bg-white border border-slate-200 p-8 rounded-2xl max-w-md w-full shadow-2xl relative">
        {onCancel && (
          <button
            onClick={onCancel}
            className="absolute top-4 right-4 text-slate-500 hover:text-slate-900 transition-colors"
          >
            <svg xmlns="http://www.w3.org/2000/svg" className="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M6 18L18 6M6 6l12 12" /></svg>
          </button>
        )}
        <h2 className="text-2xl font-bold mb-4 bg-gradient-to-r from-blue-600 to-sky-500 bg-clip-text text-transparent">
          Pro Model Access Required
        </h2>
        <p className="text-slate-600 mb-6 leading-relaxed">
          이 앱은 고품질 2K/4K 생성을 위해 <b>Gemini 3 Image Preview</b> 모델을 사용합니다.
          유료 GCP 프로젝트의 Gemini API Key를 아래에 입력해주세요.
        </p>
        <div className="space-y-4">
          <input
            type="password"
            value={manualKey}
            onChange={(e) => setManualKey(e.target.value)}
            onKeyDown={(e) => e.key === 'Enter' && handleSave()}
            placeholder="AIza... 형식의 API Key를 붙여넣으세요"
            className="w-full bg-white border border-slate-300 rounded-xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-blue-500/50 transition-all text-slate-900"
            autoFocus
          />
          <p className="text-[11px] text-slate-500 leading-snug">
            키는 이 브라우저(localStorage)에만 저장되며 Google API 호출에만 사용됩니다.
          </p>
          <button
            onClick={handleSave}
            disabled={!manualKey.trim()}
            className={`w-full font-semibold py-3 px-6 rounded-xl transition-all shadow-lg active:scale-95 ${
              manualKey.trim()
                ? 'bg-blue-600 hover:bg-blue-500 text-white shadow-blue-500/20'
                : 'bg-slate-200 text-slate-400 cursor-not-allowed shadow-none'
            }`}
          >
            API Key 저장 & 시작하기
          </button>

          {onCancel && (
            <button
              onClick={onCancel}
              className="w-full bg-slate-100 hover:bg-blue-100 text-slate-700 font-medium py-3 px-6 rounded-xl transition-all border border-slate-300"
            >
              Cancel
            </button>
          )}

          <div className="flex justify-between pt-2">
            <a
              href="https://aistudio.google.com/apikey"
              target="_blank"
              rel="noopener noreferrer"
              className="text-xs text-slate-500 hover:text-slate-800 underline"
            >
              AI Studio에서 키 발급 ↗
            </a>
            <a
              href="https://ai.google.dev/gemini-api/docs/billing"
              target="_blank"
              rel="noopener noreferrer"
              className="text-xs text-slate-500 hover:text-slate-800 underline"
            >
              Gemini API billing 안내
            </a>
          </div>
        </div>
      </div>
    </div>
  );
};

/* ============================================================
 * App
 * ============================================================ */
const App = () => {
  const [apiKey, setApiKey] = useState(getStoredKey());
  const [hasApiKey, setHasApiKey] = useState(() => !!getStoredKey());
  const [isGenerating, setIsGenerating] = useState(false);
  const [step, setStep] = useState({ status: 'idle', message: '' });
  const [generatedBanner, setGeneratedBanner] = useState(null);

  const [config, setConfig] = useState({
    productCode: '코드 (CODE)',
    command: 'Modern, minimalist, high-end tech aesthetic, clean lines, professional lighting, negative space for text.',
    size: '2K',
    aspectRatio: '21:9',
  });

  const [isKeySettingsOpen, setIsKeySettingsOpen] = useState(false);

  const handleFileChange = (e) => {
    const file = e.target.files?.[0];
    if (file) {
      const reader = new FileReader();
      reader.onloadend = () => {
        setConfig(prev => ({ ...prev, referenceImage: reader.result }));
      };
      reader.readAsDataURL(file);
    }
  };

  const startGeneration = async () => {
    if (!config.productCode.trim()) {
      alert("Product code/name is required.");
      return;
    }
    if (!apiKey) {
      setHasApiKey(false);
      return;
    }

    setIsGenerating(true);
    setGeneratedBanner(null);

    try {
      setStep({ status: 'searching', message: 'Analyzing product context and searching trends...' });
      const { concept, sources } = await searchAndConceptualize(config, apiKey);

      setStep({
        status: 'generating',
        message: config.referenceImage
          ? `Preserving original image & crafting ${config.size} banner...`
          : `Crafting high-fidelity ${config.size} banner...`
      });
      const imageUrl = await generateBannerImage(config, concept, apiKey);

      setGeneratedBanner({
        url: imageUrl,
        concept: concept,
        sources: sources,
      });
      setStep({ status: 'completed', message: 'Banner generated successfully!' });
    } catch (error) {
      console.error(error);
      const msg = error.message || 'An error occurred during generation.';
      setStep({ status: 'error', message: msg });
      if (msg.includes("Requested entity was not found") || msg.includes("API key not valid") || msg.includes("API_KEY_INVALID")) {
        setHasApiKey(false);
      }
    } finally {
      setIsGenerating(false);
    }
  };

  if (hasApiKey === false || isKeySettingsOpen) {
    return (
      <ApiKeyDialog
        onSelect={(key) => {
          setApiKey(key);
          setHasApiKey(true);
          setIsKeySettingsOpen(false);
        }}
        onCancel={hasApiKey ? () => setIsKeySettingsOpen(false) : undefined}
      />
    );
  }

  return (
    <div className="min-h-screen bg-slate-50 text-slate-900 flex flex-col">
      {/* Header */}
      <header className="border-b border-slate-200 bg-white/80 backdrop-blur-md sticky top-0 z-40">
        <div className="max-w-7xl mx-auto px-6 py-4 flex items-center justify-between">
          <div className="flex items-center gap-3">
            <div className="w-10 h-10 bg-gradient-to-tr from-blue-600 to-sky-400 rounded-lg flex items-center justify-center shadow-lg shadow-blue-600/20">
              <svg xmlns="http://www.w3.org/2000/svg" className="w-6 h-6 text-white" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect width="20" height="14" x="2" y="3" rx="2"/><line x1="8" x2="16" y1="21" y2="21"/><line x1="12" x2="12" y1="17" y2="21"/></svg>
            </div>
            <div>
              <h1 className="text-xl font-bold tracking-tight">SSAKA Banner Studio</h1>
              <p className="text-[10px] uppercase tracking-widest text-slate-500 font-semibold">Pro Creative Suite</p>
            </div>
          </div>
          <div className="flex items-center gap-4">
            <button
              onClick={() => setIsKeySettingsOpen(true)}
              className="text-xs px-3 py-1.5 bg-slate-100 hover:bg-slate-200 rounded-lg text-slate-600 border border-slate-300 transition-colors flex items-center gap-2"
            >
              <svg xmlns="http://www.w3.org/2000/svg" className="w-3.5 h-3.5" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 2l-2 2m-7.61 7.61a5.5 5.5 0 1 1-7.778 7.778 5.5 5.5 0 0 1 7.777-7.777zm0 0L15.5 7.5m0 0l3 3m-3-3l-2.25-2.25"/></svg>
              API Key Settings
            </button>
            <span className="text-xs px-2 py-1 bg-slate-100 rounded text-slate-600 border border-slate-300">Gemini 3 Pro + Flash</span>
          </div>
        </div>
      </header>

      <main className="flex-1 max-w-7xl mx-auto w-full px-6 py-8 grid grid-cols-1 lg:grid-cols-12 gap-8">

        {/* Left: Input Panel */}
        <section className="lg:col-span-4 space-y-6">
          <div className="bg-white border border-slate-200 rounded-2xl p-6 shadow-xl">
            <h2 className="text-lg font-semibold mb-4 flex items-center gap-2">
              <span className="w-1.5 h-1.5 bg-blue-500 rounded-full animate-pulse"></span>
              Banner Specifications
            </h2>

            <div className="space-y-4">
              {/* Product Code */}
              <div>
                <label className="block text-sm font-medium text-slate-600 mb-1.5">Product Name / Code</label>
                <input
                  type="text"
                  placeholder="e.g. RTX 4090, Nike Air Max..."
                  className="w-full bg-white border border-slate-300 rounded-xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-blue-500/50 transition-all text-slate-900"
                  value={config.productCode}
                  onChange={e => setConfig(prev => ({ ...prev, productCode: e.target.value }))}
                />
              </div>

              {/* Command Prompt */}
              <div>
                <label className="block text-sm font-medium text-slate-600 mb-1.5">Custom Instructions (Prompt)</label>
                <textarea
                  rows={3}
                  placeholder="e.g. Futuristic dark theme, minimalist background, neon accents..."
                  className="w-full bg-white border border-slate-300 rounded-xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-blue-500/50 transition-all text-slate-900 resize-none"
                  value={config.command}
                  onChange={e => setConfig(prev => ({ ...prev, command: e.target.value }))}
                />
              </div>

              {/* Configuration Grid */}
              <div className="grid grid-cols-2 gap-4">
                <div>
                  <label className="block text-sm font-medium text-slate-600 mb-1.5">Image Size</label>
                  <select
                    className="w-full bg-white border border-slate-300 rounded-xl px-3 py-2.5 focus:outline-none focus:ring-2 focus:ring-blue-500/50"
                    value={config.size}
                    onChange={e => setConfig(prev => ({ ...prev, size: e.target.value }))}
                  >
                    <option value="1K">1K (Standard)</option>
                    <option value="2K">2K (High-Def)</option>
                    <option value="4K">4K (Ultra-HD)</option>
                  </select>
                </div>
                <div>
                  <label className="block text-sm font-medium text-slate-600 mb-1.5">Aspect Ratio</label>
                  <select
                    className="w-full bg-white border border-slate-300 rounded-xl px-3 py-2.5 focus:outline-none focus:ring-2 focus:ring-blue-500/50"
                    value={config.aspectRatio}
                    onChange={e => setConfig(prev => ({ ...prev, aspectRatio: e.target.value }))}
                  >
                    <option value="16:9">16:9 (Landscape)</option>
                    <option value="21:9">21:9 (Cinematic)</option>
                    <option value="4:1">4:1 (Ultra-Wide)</option>
                    <option value="4:3">4:3 (Classic)</option>
                    <option value="1:1">1:1 (Square)</option>
                  </select>
                </div>
              </div>

              {/* Reference Image Upload */}
              <div className="group">
                <label className="block text-sm font-medium text-slate-600 mb-1.5">Reference Style (Optional)</label>
                <div
                  className={`relative border-2 border-dashed rounded-xl p-4 transition-all text-center cursor-pointer
                    ${config.referenceImage ? 'border-blue-400 bg-blue-50' : 'border-slate-300 hover:border-blue-400 hover:bg-blue-50/60'}`}
                >
                  <input
                    type="file"
                    accept="image/*"
                    onChange={handleFileChange}
                    className="absolute inset-0 opacity-0 cursor-pointer z-10"
                  />
                  {config.referenceImage ? (
                    <div className="flex flex-col items-center gap-2">
                      <img src={config.referenceImage} alt="Reference" className="w-16 h-16 object-cover rounded-md border border-slate-300" />
                      <div className="flex items-center gap-1.5">
                        <span className="w-1.5 h-1.5 bg-blue-500 rounded-full animate-pulse"></span>
                        <span className="text-[10px] text-blue-600 font-bold uppercase tracking-wider">Strict Preservation Active</span>
                      </div>
                    </div>
                  ) : (
                    <div className="flex flex-col items-center gap-1">
                      <svg xmlns="http://www.w3.org/2000/svg" className="w-6 h-6 text-slate-500" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12" /></svg>
                      <span className="text-xs text-slate-500">Drag & drop reference image</span>
                    </div>
                  )}
                </div>
              </div>

              <button
                onClick={startGeneration}
                disabled={isGenerating}
                className={`w-full py-4 rounded-xl font-bold transition-all shadow-xl flex items-center justify-center gap-3
                  ${isGenerating
                    ? 'bg-slate-200 text-slate-400 cursor-not-allowed'
                    : 'bg-gradient-to-r from-blue-600 to-indigo-600 hover:from-blue-500 hover:to-indigo-500 text-white shadow-blue-600/20 active:scale-[0.98]'}`}
              >
                {isGenerating ? (
                  <>
                    <svg className="animate-spin h-5 w-5 text-slate-500" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle className="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" strokeWidth="4"></circle><path className="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>
                    <span>Generating...</span>
                  </>
                ) : (
                  <>
                    <svg xmlns="http://www.w3.org/2000/svg" className="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M13 10V3L4 14h7v7l9-11h-7z" /></svg>
                    <span>Create AI Banner</span>
                  </>
                )}
              </button>
            </div>
          </div>

          {/* Status Panel */}
          {step.status !== 'idle' && (
            <div className={`bg-white border rounded-2xl p-4 transition-all ${step.status === 'error' ? 'border-red-500/50' : 'border-slate-200'}`}>
              <div className="flex items-center gap-3">
                {step.status === 'searching' && <div className="w-2 h-2 bg-blue-500 rounded-full animate-ping"></div>}
                {step.status === 'generating' && <div className="w-2 h-2 bg-blue-500 rounded-full animate-pulse"></div>}
                <p className={`text-sm ${step.status === 'error' ? 'text-red-600' : 'text-slate-600'}`}>{step.message}</p>
              </div>
            </div>
          )}
        </section>

        {/* Right: Preview Panel */}
        <section className="lg:col-span-8 space-y-6">
          <div className="bg-white border border-slate-200 rounded-2xl min-h-[500px] flex flex-col relative overflow-hidden">
            {/* Background Mesh */}
            <div className="absolute inset-0 opacity-20 pointer-events-none">
              <div className="absolute top-[-10%] left-[-10%] w-[40%] h-[40%] bg-blue-600 rounded-full blur-[120px]"></div>
              <div className="absolute bottom-[-10%] right-[-10%] w-[40%] h-[40%] bg-sky-300 rounded-full blur-[120px]"></div>
            </div>

            {generatedBanner ? (
              <div className="relative z-10 flex flex-col h-full">
                {/* Image View */}
                <div className="flex-1 p-6 flex flex-col items-center justify-center">
                  <div className="relative group max-w-full">
                    <img
                      src={generatedBanner.url}
                      alt="Generated Banner"
                      className="rounded-xl shadow-2xl border border-slate-200 max-w-full max-h-[60vh] object-contain transition-transform duration-500 hover:scale-[1.01]"
                    />
                    <div className="absolute top-4 right-4 flex gap-2">
                      <a
                        href={generatedBanner.url}
                        download={`${config.productCode}-banner.png`}
                        className="bg-black/60 backdrop-blur-md p-2 rounded-lg text-white hover:bg-black/80 transition-colors"
                      >
                        <svg xmlns="http://www.w3.org/2000/svg" className="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M4 16v1a2 2 0 002 2h12a2 2 0 002-2v-1m-4-4l-4 4m0 0l-4-4m4 4V4" /></svg>
                      </a>
                    </div>
                  </div>
                </div>

                {/* Info Overlay */}
                <div className="bg-slate-50/90 backdrop-blur-xl border-t border-slate-200 p-6 space-y-4">
                  <div>
                    <h3 className="text-xs uppercase tracking-widest text-slate-500 font-bold mb-2">AI Concept Strategy</h3>
                    <p className="text-sm text-slate-700 leading-relaxed italic">
                      "{generatedBanner.concept}"
                    </p>
                  </div>
                  {generatedBanner.sources.length > 0 && (
                    <div>
                      <h3 className="text-xs uppercase tracking-widest text-slate-500 font-bold mb-2">Research Grounding</h3>
                      <div className="flex flex-wrap gap-2">
                        {generatedBanner.sources.map((source, i) => (
                          <a
                            key={i}
                            href={source.uri}
                            target="_blank"
                            className="flex items-center gap-1.5 text-[10px] bg-blue-50 hover:bg-blue-100 border border-slate-200 px-2 py-1 rounded transition-colors text-blue-600"
                          >
                            <svg xmlns="http://www.w3.org/2000/svg" className="w-3 h-3" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>
                            {source.title.slice(0, 30)}...
                          </a>
                        ))}
                      </div>
                    </div>
                  )}
                </div>
              </div>
            ) : (
              <div className="flex-1 flex flex-col items-center justify-center p-12 text-center z-10">
                <div className="w-20 h-20 bg-slate-100 rounded-3xl flex items-center justify-center mb-6 border border-slate-300 shadow-inner">
                  <svg xmlns="http://www.w3.org/2000/svg" className="w-10 h-10 text-slate-400" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="1.5" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z" /></svg>
                </div>
                <h3 className="text-xl font-bold text-slate-700 mb-2">Ready for Creative Magic</h3>
                <p className="text-slate-500 max-w-sm">Enter your product details and hit generate to see a professional banner powered by Gemini 3.</p>
