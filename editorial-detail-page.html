<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editorial Detail Page AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,700&family=Outfit:wght@300;500;800&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
    <style>
        body {
            font-family: 'Pretendard', 'Inter', sans-serif;
            background-color: #fafafa;
            color: #111;
            letter-spacing: -0.02em;
        }
        .serif {
            font-family: 'Playfair Display', serif;
        }
        .outfit {
            font-family: 'Outfit', sans-serif;
        }
        .letter-spacing-huge {
            letter-spacing: 0.4em;
        }
        /* Custom Scrollbar for premium feel */
        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: #f1f1f1;
        }
        ::-webkit-scrollbar-thumb {
            background: #ccc;
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #111;
        }
    </style>
    <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@^19.2.3",
        "react-dom/": "https://esm.sh/react-dom@^19.2.3/",
        "react/": "https://esm.sh/react@^19.2.3/",
        "@google/genai": "https://esm.sh/@google/genai@^1.34.0"
      }
    }
    </script>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel" data-type="module" data-presets="react,typescript">
import React, { useState, useEffect, useRef } from 'react';
import ReactDOM from 'react-dom/client';
import { GoogleGenAI } from '@google/genai';

/* ============================================================
 * API Key 저장 (standalone HTML — localStorage 사용)
 * ============================================================ */
const API_KEY_STORAGE = 'editorial_studio_api_key';
const getStoredKey = () => localStorage.getItem(API_KEY_STORAGE) || '';

/* ============================================================
 * GeminiService
 * ============================================================ */
class GeminiService {
  static async fetchProductDetails(name, code, apiKey) {
    const ai = new GoogleGenAI({ apiKey });
    const prompt = `제품명: "${name}", 코드: "${code}".
    무신사/29CM 스타일의 미니멀 에디토리얼을 위한 상세페이지 문구를 작성해 주세요.

    요구사항:
    1. 헤드카피: 제품의 핵심을 찌르는 감각적이고 짧은 한 문장 (절대 [HEADLINE] 이라는 글자를 포함하지 마세요)
    2. 핵심 특징: 제품의 정체성을 보여주는 4가지 포인트를 '소제목: 핵심설명' 형태로 작성.
    3. 핵심설명: 각 포인트당 약 15~20자 내외로 기존보다 1/2 수준으로 요약하세요.
    4. 대칭성 유지: 4개 항목의 텍스트 길이를 최대한 비슷하게 맞춰서 시각적으로 질서 있게 보이게 하세요.
    5. 반드시 한국어 사용.
    6. 출력 형식:
       [HEADLINE]: (내용)
       [FEATURES]:
       • 소제목: 요약된 설명(15-20자)
       • 소제목: 요약된 설명(15-20자)
       • 소제목: 요약된 설명(15-20자)
       • 소제목: 요약된 설명(15-20자)`;

    try {
      const response = await ai.models.generateContent({
        model: "gemini-3-flash-preview",
        contents: prompt,
        config: {
          tools: [{ googleSearch: {} }],
        },
      });

      const text = response.text || "";
      const headCopyMatch = text.match(/\[HEADLINE\]:\s*(.*)/);
      const featuresMatch = text.match(/\[FEATURES\]:\s*([\s\S]*)/);

      const headCopy = headCopyMatch ? headCopyMatch[1].trim() : "";
      const info = featuresMatch ? featuresMatch[1].trim() : text;

      const sources = response.candidates?.[0]?.groundingMetadata?.groundingChunks || [];
      return { headCopy, info, sources };
    } catch (error) {
      console.error("Fetch Product Details Error:", error);
      throw error;
    }
  }

  static async generateDetailPage(productName, headCopy, productInfo, base64Images, apiKey) {
    const ai = new GoogleGenAI({ apiKey });
    const model = 'gemini-3-pro-image-preview';

    const imageParts = base64Images.map(data => {
      const mimeType = data.split(';')[0].split(':')[1] || 'image/jpeg';
      const base64Data = data.split(',')[1];
      return {
        inlineData: {
          data: base64Data,
          mimeType: mimeType
        }
      };
    });

    const features = productInfo.replace(/•/g, '').split('\n').filter(l => l.trim()).slice(0, 4);

    // Determine model type based on product name keywords
    let modelDescription = "stylish 20-something Korean male model with a sporty and energetic street vibe";
    if (productName.includes("우먼") || productName.includes("여성")) {
      modelDescription = "stylish 20-something Korean female model with a healthy and sporty street vibe";
    } else if (productName.includes("주니어") || productName.includes("키즈")) {
      modelDescription = "active Korean junior (teen) model with a cool sporty aesthetic";
    }

    const promptText = `
      Create a 4K PREMIUM EDITORIAL LOOKBOOK POSTER for "${productName}".
      **STYLE: "Context-Aware High-End Young Casual Sporty Street" (Musinsa / 29CM Aesthetic)**
      **HEAD COPY: "${headCopy}"**
      **FEATURES: ${features.join(', ')}**

      [STEP 1: PRODUCT ANALYSIS & ENVIRONMENT SELECTION]
      - **TASK**: Analyze "${productName}" and its features to select the most logically appropriate outdoor background.
      - **CONTEXT MAPPING EXAMPLES**:
        1. **SOCCER / FOOTBALL**: Use professional soccer pitches, floodlit urban football cages, or stadium bleachers.
        2. **RUNNING / TRAINING**: Use modern city tracks, sunrise river parks, or architectural concrete stairs.
        3. **STREETWEAR (SNEAKERS/HOODIES)**: Use Seongsu-dong industrial alleys, graffiti-laden urban plazas, or minimalist street crossings.
        4. **OUTDOOR / HIKING**: Use rugged park trails, minimalist rocky terrains, or pine forest edges with sharp mountain light.
        5. **TENNIS / GOLF**: Use clean-cut clay courts, minimalist putting greens, or upscale club house exteriors.
      - **SELECTED SCENE**: Based on the analysis, choose the one that maximizes the product's functional identity.

      [SECTION 1: HERO PICTORIAL (TOP 45%)]
      - VISUAL: A cinematic, high-energy pictorial shot of a ${modelDescription} wearing "${productName}" in the LOGICALLY SELECTED background above.
      - ATMOSPHERE: Sophisticated yet active. If it's a soccer jersey, the model should be in a stadium-inspired environment with dramatic lighting.
      - TYPOGRAPHY:
        - **PRODUCT NAME**: Bold, technical sans-serif.
        - **HEAD COPY**: "${headCopy}" in a clean subtitle font.
        - **PLACEMENT**: Integrate text into the negative space of the city/sport background. Avoid the model's face and the product's main silhouette.

      [SECTION 2: INTEGRATED DETAIL GRID (BOTTOM 55%)]
      - LAYOUT: A perfect 2x2 grid system.
      - VISUAL CONTINUITY:
        - These 4 macro shots MUST feel like a "Continuous Story" from the Hero shot.
        - Use consistent lighting and background textures (e.g., grass if on a field, concrete if on a track).
        - Highlight "Performance Textures": Breathable mesh, technical fabrics, high-quality finishes.
      - CONTENT: ${features.join(' | ')}.

      [AESTHETIC RULES]
      - **COLOR GRADE**: Energetic and vibrant for sports; moody and desaturated for street. Always keep it "Fresh" and "Premium".
      - **MINIMALISM**: Use 1px dividers. Maintain a sharp, magazine-like grid.
      - **HANGEUL**: Render Korean text with absolute vector-like clarity.

      [TECHNICAL SPEC]
      - RATIO: 9:16 vertical.
      - RESOLUTION: 4K.
      - OUTPUT: Final designed image only.
    `;

    try {
      const response = await ai.models.generateContent({
        model: model,
        contents: {
          parts: [
            { text: promptText },
            ...imageParts
          ]
        },
        config: {
          imageConfig: {
            aspectRatio: "9:16",
            imageSize: "4K"
          }
        }
      });

      let imageUrl = "";
      if (response.candidates?.[0]?.content?.parts) {
        for (const part of response.candidates[0].content.parts) {
          if (part.inlineData) {
            imageUrl = `data:image/png;base64,${part.inlineData.data}`;
            break;
          }
        }
      }

      if (!imageUrl) throw new Error("이미지 생성에 실패했습니다.");
      return imageUrl;
    } catch (error) {
      console.error("Generate Image Error:", error);
      throw error;
    }
  }
}

/* ============================================================
 * ImageUploader
 * ============================================================ */
const ImageUploader = ({ onImagesChange, maxFiles = 5 }) => {
  const [uploadedFiles, setUploadedFiles] = useState([]);
  const [isDragging, setIsDragging] = useState(false);
  const fileInputRef = useRef(null);

  const handleFiles = (files) => {
    const newFiles = Array.from(files)
      .slice(0, maxFiles - uploadedFiles.length)
      .map(file => ({
        id: Math.random().toString(36).substr(2, 9),
        file,
        preview: URL.createObjectURL(file)
      }));

    const updated = [...uploadedFiles, ...newFiles];
    setUploadedFiles(updated);
    onImagesChange(updated);
  };

  const onDrop = (e) => {
    e.preventDefault();
    setIsDragging(false);
    if (e.dataTransfer.files) {
      handleFiles(e.dataTransfer.files);
    }
  };

  const removeFile = (id) => {
    const updated = uploadedFiles.filter(f => f.id !== id);
    setUploadedFiles(updated);
    onImagesChange(updated);
  };

  return (
    <div className="w-full space-y-4">
      <div
        onDragOver={(e) => { e.preventDefault(); setIsDragging(true); }}
        onDragLeave={() => setIsDragging(false)}
        onDrop={onDrop}
        onClick={() => fileInputRef.current?.click()}
        className={`border-2 border-dashed rounded-xl p-8 text-center cursor-pointer transition-all duration-200
          ${isDragging ? 'border-black bg-gray-50' : 'border-gray-300 hover:border-gray-400 bg-white'}`}
      >
        <input
          type="file"
          ref={fileInputRef}
          multiple
          className="hidden"
          accept="image/*"
          onChange={(e) => e.target.files && handleFiles(e.target.files)}
        />
        <div className="flex flex-col items-center gap-2">
          <i className="fa-solid fa-cloud-arrow-up text-3xl text-gray-400"></i>
          <p className="text-gray-600 font-medium">이미지를 클릭하거나 여기로 드래그하세요</p>
          <p className="text-sm text-gray-400">최대 {maxFiles}장 (JPG, PNG)</p>
        </div>
      </div>

      {uploadedFiles.length > 0 && (
        <div className="grid grid-cols-5 gap-4">
          {uploadedFiles.map((file) => (
            <div key={file.id} className="relative group aspect-square">
              <img
                src={file.preview}
                alt="미리보기"
                className="w-full h-full object-cover rounded-lg border border-gray-100"
              />
              <button
                onClick={(e) => { e.stopPropagation(); removeFile(file.id); }}
                className="absolute -top-2 -right-2 bg-black text-white rounded-full w-6 h-6 flex items-center justify-center text-xs opacity-0 group-hover:opacity-100 transition-opacity"
              >
                <i className="fa-solid fa-xmark"></i>
              </button>
            </div>
          ))}
        </div>
      )}
    </div>
  );
};

/* ============================================================
 * App
 * ============================================================ */
const App = () => {
  const [productName, setProductName] = useState('');
  const [productCode, setProductCode] = useState('');
  const [images, setImages] = useState([]);
  const [isGenerating, setIsGenerating] = useState(false);
  const [status, setStatus] = useState('');
  const [result, setResult] = useState(null);

  const [apiKey, setApiKey] = useState(getStoredKey());
  const [hasApiKey, setHasApiKey] = useState(() => !!getStoredKey());
  const [manualKey, setManualKey] = useState('');

  const handleSaveKey = () => {
    const key = manualKey.trim();
    if (!key) return;
    localStorage.setItem(API_KEY_STORAGE, key);
    setApiKey(key);
    setHasApiKey(true);
    setManualKey('');
  };

  const fileToBase64 = (file) => {
    return new Promise((resolve, reject) => {
      const reader = new FileReader();
      reader.readAsDataURL(file);
      reader.onload = () => resolve(reader.result);
      reader.onerror = error => reject(error);
    });
  };

  const generate = async (isRegenerate = false) => {
    if (!productName || !productCode || images.length === 0) {
      alert('필수 정보를 모두 입력해 주세요.');
      return;
    }

    setIsGenerating(true);
    if (!isRegenerate) setResult(null);

    try {
      let currentHeadCopy = result?.headCopy || '';
      let currentInfo = result?.organizedInfo || '';
      let currentSources = result?.sources || [];

      if (!isRegenerate || !currentHeadCopy) {
        setStatus('제품 정보를 분석하고 있습니다.');
        const details = await GeminiService.fetchProductDetails(productName, productCode, apiKey);
        currentHeadCopy = details.headCopy;
        currentInfo = details.info;
        currentSources = details.sources;
      }

      setStatus('고화질 에디토리얼 상세페이지를 생성 중입니다.');
      const base64Images = await Promise.all(images.map(img => fileToBase64(img.file)));
      const imageUrl = await GeminiService.generateDetailPage(productName, currentHeadCopy, currentInfo, base64Images, apiKey);

      setResult({
        imageUrl,
        headCopy: currentHeadCopy,
        organizedInfo: currentInfo,
        sources: currentSources
      });
      setStatus('');
    } catch (error) {
      console.error(error);
      const msg = error.message || '';
      if (msg.includes("Requested entity was not found") || msg.includes("API key not valid") || msg.includes("API_KEY_INVALID")) {
        setHasApiKey(false);
        alert('API 키를 다시 입력해 주세요 (유효하지 않은 키이거나 결제 설정이 필요할 수 있습니다).');
      } else {
        alert('생성에 실패했습니다: ' + msg);
      }
    } finally {
      setIsGenerating(false);
    }
  };

  if (!hasApiKey) {
    return (
      <div className="min-h-screen bg-[#fafafa] flex flex-col items-center justify-center p-6 text-center">
        <h1 className="serif text-6xl mb-4 text-[#111] tracking-tighter">Studio Editorial</h1>
        <p className="text-gray-400 mb-10 max-w-sm text-sm font-light leading-relaxed outfit tracking-widest uppercase">
          High-End Product Visual Generator
        </p>
        <div className="w-full max-w-sm space-y-4">
          <input
            type="password"
            value={manualKey}
            onChange={(e) => setManualKey(e.target.value)}
            onKeyDown={(e) => e.key === 'Enter' && handleSaveKey()}
            placeholder="Gemini API Key (AIza...)"
            className="w-full px-6 py-4 bg-white border border-gray-200 rounded-full text-center text-sm outline-none focus:border-black transition-all tracking-wide"
            autoFocus
          />
          <button
            onClick={handleSaveKey}
            disabled={!manualKey.trim()}
            className={`outfit w-full px-14 py-4 rounded-full font-extrabold transition-all shadow-2xl tracking-[0.2em] text-xs ${
              manualKey.trim()
                ? 'bg-[#111] text-white hover:bg-black'
                : 'bg-gray-100 text-gray-300 cursor-not-allowed shadow-none'
            }`}
          >
            CONNECT API
          </button>
        </div>
        <p className="mt-6 text-[10px] text-gray-400 outfit tracking-tight">
          키는 이 브라우저(localStorage)에만 저장됩니다. 유료 GCP 프로젝트의 키가 필요할 수 있습니다.<br/>
          <a href="https://aistudio.google.com/apikey" target="_blank" rel="noreferrer" className="underline hover:text-black">
            Get API Key
          </a>
          {' · '}
          <a href="https://ai.google.dev/gemini-api/docs/billing" target="_blank" rel="noreferrer" className="underline hover:text-black">
            Billing Documentation
          </a>
        </p>
      </div>
    );
  }

  return (
    <div className="max-w-6xl mx-auto px-6 py-20">
      <header className="mb-24 text-center relative">
        <p className="outfit text-[#111] text-[10px] font-extrabold tracking-[0.6em] uppercase mb-4">The New Standard</p>
        <h1 className="serif text-7xl tracking-tighter text-[#111] mb-2 ">웹 상세이미지</h1>
        <div className="h-[2px] w-12 bg-black mx-auto mt-6"></div>
        <button
          onClick={() => {
            localStorage.removeItem(API_KEY_STORAGE);
            setApiKey('');
            setHasApiKey(false);
          }}
          className="outfit absolute top-0 right-0 text-[9px] font-bold text-gray-300 hover:text-black tracking-[0.3em] uppercase transition-colors"
          title="API Key 재설정"
        >
          API Key
        </button>
      </header>

      <div className="space-y-32">
        <section className="bg-white p-12 rounded-[3rem] border border-gray-100 shadow-[0_20px_50px_rgba(0,0,0,0.02)] transition-all">
          <div className="max-w-4xl mx-auto space-y-12">
            <div className="grid grid-cols-1 md:grid-cols-2 gap-12">
              <div className="group space-y-4">
                <label className="outfit text-[9px] font-black text-gray-400 uppercase tracking-[0.3em] ml-1">Product Title</label>
                <input
                  type="text"
                  placeholder="예: 뉴발란스 2002R 그레이"
                  className="w-full px-0 py-3 bg-transparent border-b border-gray-200 focus:border-black outline-none text-xl font-bold transition-all placeholder:text-gray-200 tracking-tight"
                  value={productName}
                  onChange={(e) => setProductName(e.target.value)}
                />
              </div>
              <div className="group space-y-4">
                <label className="outfit text-[9px] font-black text-gray-400 uppercase tracking-[0.3em] ml-1">Reference Code</label>
                <input
                  type="text"
                  placeholder="예: M2002RST"
                  className="w-full px-0 py-3 bg-transparent border-b border-gray-200 focus:border-black outline-none text-xl font-bold transition-all placeholder:text-gray-200 tracking-tight"
                  value={productCode}
                  onChange={(e) => setProductCode(e.target.value)}
                />
              </div>
            </div>

            <ImageUploader onImagesChange={setImages} maxFiles={5} />

            <div className="flex justify-center pt-8">
              <button
                disabled={isGenerating}
                onClick={() => generate(false)}
                className={`outfit group relative overflow-hidden px-20 py-6 rounded-full font-extrabold tracking-[0.3em] text-[11px] transition-all
                  ${isGenerating ? 'bg-gray-50 text-gray-300 cursor-not-allowed' : 'bg-[#111] text-white hover:scale-[1.03] active:scale-[0.98] shadow-2xl'}`}
              >
                <span className="relative z-10 flex items-center justify-center gap-4">
                  {isGenerating && <div className="w-4 h-4 border-2 border-gray-300 border-t-transparent rounded-full animate-spin"></div>}
                  {isGenerating ? status : 'GENERATE LOOKBOOK'}
                </span>
                {!isGenerating && <div className="absolute inset-0 bg-gradient-to-r from-zinc-800 to-black opacity-0 group-hover:opacity-100 transition-opacity"></div>}
              </button>
            </div>
          </div>
        </section>

        {result && (
          <div className="grid grid-cols-1 lg:grid-cols-12 gap-20 pb-32">
            <div className="lg:col-span-7 space-y-8">
              <div className="relative group rounded-[3.5rem] overflow-hidden shadow-[0_50px_100px_-20px_rgba(0,0,0,0.2)] ring-1 ring-black/5 aspect-[9/16] bg-gray-100">
                <img src={result.imageUrl} alt="Result" className="w-full h-full object-cover" />
                {isGenerating && (
                  <div className="absolute inset-0 bg-white/80 backdrop-blur-xl flex items-center justify-center z-20">
                    <div className="text-center space-y-6">
                      <div className="w-16 h-16 border-b-2 border-black rounded-full animate-spin mx-auto"></div>
                      <p className="outfit text-black font-extrabold tracking-widest text-xs uppercase">{status}</p>
                    </div>
                  </div>
                )}
              </div>
              <div className="grid grid-cols-2 gap-6">
                <button
                  onClick={() => generate(true)}
                  disabled={isGenerating}
                  className="outfit flex items-center justify-center gap-3 bg-white border border-gray-200 text-black py-6 rounded-[2rem] font-extrabold text-[10px] tracking-widest hover:bg-gray-50 transition-all uppercase"
                >
                  <i className="fa-solid fa-rotate-right"></i>
                  Regenerate Concept
                </button>
                <a
                  href={result.imageUrl}
                  download={`${productName}_editorial.png`}
                  className="outfit flex items-center justify-center gap-3 bg-[#111] text-white py-6 rounded-[2rem] font-extrabold text-[10px] tracking-widest hover:bg-black transition-all shadow-xl uppercase"
                >
                  <i className="fa-solid fa-download"></i>
                  Download 4K Poster
                </a>
              </div>
            </div>

            <div className="lg:col-span-5 flex flex-col justify-center space-y-16">
              <div className="space-y-6">
                <span className="serif text-4xl text-gray-300 italic">Analysis.</span>
                <h2 className="text-5xl font-extrabold text-[#111] leading-tight tracking-tighter">
                  {result.headCopy}
                </h2>
              </div>

              <div className="space-y-8">
                <span className="outfit text-[10px] font-black text-gray-300 uppercase tracking-[0.4em]">Editorial Features</span>
                <div className="grid grid-cols-1 gap-4">
                  {result.organizedInfo.split('\n').filter(line => line.trim()).map((line, i) => {
                    const parts = line.replace('• ', '').split(':');
                    const title = parts[0];
                    const content = parts.slice(1).join(':');
                    return (
                      <div key={i} className="group p-6 bg-white rounded-[2rem] border border-gray-100 transition-all hover:border-black/5 hover:shadow-lg flex flex-col gap-2">
                        <span className="outfit text-[10px] font-black uppercase tracking-[0.3em] text-gray-400">
                          {title}
                        </span>
                        <span className="text-lg font-bold text-[#111] tracking-tight leading-snug">
                          {content}
                        </span>
                      </div>
                    );
                  })}
                </div>
              </div>

              {result.sources.length > 0 && (
                <div className="pt-12 border-t border-gray-100">
                  <h3 className="outfit text-[10px] font-black text-gray-300 uppercase mb-6 tracking-[0.4em]">Inspiration Sources</h3>
                  <div className="space-y-3">
                    {result.sources.slice(0, 3).map((source, idx) => (
                      <a
                        key={idx}
                        href={source.web?.uri}
                        target="_blank"
                        rel="noreferrer"
                        className="flex items-center gap-4 text-xs text-gray-400 hover:text-black transition-all truncate group outfit tracking-wider"
                      >
                        <span className="w-1 h-1 bg-gray-200 rounded-full group-hover:bg-black group-hover:w-4 transition-all"></span>
                        {source.web?.title}
                      </a>
                    ))}
                  </div>
                </div>
              )}
            </div>
          </div>
        )}
      </div>

      <footer className="mt-32 text-center pb-24 border-t border-gray-100 pt-16">
        <p className="serif text-2xl text-gray-300 italic mb-2">Refined by Studio Editorial</p>
        <p className="outfit text-[8px] font-bold text-gray-300 tracking-[0.5em] uppercase">Powered by Gemini AI 3.0</p>
      </footer>
    </div>
  );
};

const rootElement = document.getElementById('root');
const root = ReactDOM.createRoot(rootElement);
root.render(<App />);
    </script>
</body>
</html>
