/* ============================================================
 * backgroundRemover (canvas BFS utilities)
 * ============================================================ */
const removeBackgroundBFS = (canvas, tolerance) => {
  const ctx = canvas.getContext('2d');
  if (!ctx) return;

  const width = canvas.width;
  const height = canvas.height;
  const imageData = ctx.getImageData(0, 0, width, height);
  const data = imageData.data;

  const getPixelAtIdx = (idx) => ({
    r: data[idx * 4],
    g: data[idx * 4 + 1],
    b: data[idx * 4 + 2],
    a: data[idx * 4 + 3],
  });

  const corners = [
    getPixelAtIdx(0),
    getPixelAtIdx(width - 1),
    getPixelAtIdx((height - 1) * width),
    getPixelAtIdx(height * width - 1),
  ];

  const visited = new Uint8Array(width * height);
  const queue = new Int32Array(width * height);
  let head = 0;
  let tail = 0;

  for (let x = 0; x < width; x++) {
    const idx1 = x;
    const idx2 = (height - 1) * width + x;
    visited[idx1] = 1;
    visited[idx2] = 1;
    queue[tail++] = idx1;
    queue[tail++] = idx2;
  }
  for (let y = 1; y < height - 1; y++) {
    const idx1 = y * width;
    const idx2 = y * width + (width - 1);
    visited[idx1] = 1;
    visited[idx2] = 1;
    queue[tail++] = idx1;
    queue[tail++] = idx2;
  }

  const tolSq = (tolerance * 2.55) ** 2;

  const isBgColor = (r, g, b, a) => {
    if (a < 5) return true;
    if (r > 248 && g > 248 && b > 248) return true;
    for (const corner of corners) {
      if (corner.a < 5) continue;
      const dr = r - corner.r;
      const dg = g - corner.g;
      const db = b - corner.b;
      if (dr * dr + dg * dg + db * db <= tolSq) return true;
    }
    return false;
  };

  while (head < tail) {
    const idx = queue[head++];
    const x = idx % width;
    const y = Math.floor(idx / width);

    const pxIdx = idx * 4;
    const r = data[pxIdx];
    const g = data[pxIdx + 1];
    const b = data[pxIdx + 2];
    const a = data[pxIdx + 3];

    if (isBgColor(r, g, b, a)) {
      data[pxIdx] = 0;
      data[pxIdx + 1] = 0;
      data[pxIdx + 2] = 0;
      data[pxIdx + 3] = 0;

      const neighbors = [[x + 1, y], [x - 1, y], [x, y + 1], [x, y - 1]];
      for (const [nx, ny] of neighbors) {
        if (nx >= 0 && nx < width && ny >= 0 && ny < height) {
          const nIdx = ny * width + nx;
          if (visited[nIdx] === 0) {
            visited[nIdx] = 1;
            queue[tail++] = nIdx;
          }
        }
      }
    }
  }

  ctx.putImageData(imageData, 0, 0);
};

const removeBackgroundGlobal = (canvas, tolerance) => {
  const ctx = canvas.getContext('2d');
  if (!ctx) return;

  const width = canvas.width;
  const height = canvas.height;
  const imageData = ctx.getImageData(0, 0, width, height);
  const data = imageData.data;

  const corners = [
    { r: data[0], g: data[1], b: data[2], a: data[3] },
    { r: data[(width - 1) * 4], g: data[(width - 1) * 4 + 1], b: data[(width - 1) * 4 + 2], a: data[(width - 1) * 4 + 3] },
    { r: data[(height - 1) * width * 4], g: data[(height - 1) * width * 4 + 1], b: data[(height - 1) * width * 4 + 2], a: data[(height - 1) * width * 4 + 3] },
    { r: data[(height * width - 1) * 4], g: data[(height * width - 1) * 4 + 1], b: data[(height * width - 1) * 4 + 2], a: data[(height * width - 1) * 4 + 3] },
  ];

  const tolSq = (tolerance * 2.55) ** 2;

  const isBgColor = (r, g, b, a) => {
    if (a < 5) return true;
    if (r > 248 && g > 248 && b > 248) return true;
    for (const corner of corners) {
      if (corner.a < 5) continue;
      const dr = r - corner.r;
      const dg = g - corner.g;
      const db = b - corner.b;
      if (dr * dr + dg * dg + db * db <= tolSq) return true;
    }
    return false;
  };

  for (let i = 0; i < data.length; i += 4) {
    if (isBgColor(data[i], data[i + 1], data[i + 2], data[i + 3])) {
      data[i] = 0;
      data[i + 1] = 0;
      data[i + 2] = 0;
      data[i + 3] = 0;
    }
  }

  ctx.putImageData(imageData, 0, 0);
};

const removeBackgroundFromClick = (canvas, startX, startY, tolerance) => {
  const ctx = canvas.getContext('2d');
  if (!ctx) return;

  const width = canvas.width;
  const height = canvas.height;
  const imageData = ctx.getImageData(0, 0, width, height);
  const data = imageData.data;

  const startIdx = startY * width + startX;
  const startPxIdx = startIdx * 4;
  const startColor = {
    r: data[startPxIdx],
    g: data[startPxIdx + 1],
    b: data[startPxIdx + 2],
    a: data[startPxIdx + 3],
  };

  if (startColor.a < 5) return;

  const visited = new Uint8Array(width * height);
  const queue = new Int32Array(width * height);
  let head = 0;
  let tail = 0;

  queue[tail++] = startIdx;
  visited[startIdx] = 1;

  const tolSq = (tolerance * 2.55) ** 2;

  const matchesStartColor = (r, g, b, a) => {
    if (a < 5) return true;
    const dr = r - startColor.r;
    const dg = g - startColor.g;
    const db = b - startColor.b;
    return dr * dr + dg * dg + db * db <= tolSq;
  };

  while (head < tail) {
    const idx = queue[head++];
    const x = idx % width;
    const y = Math.floor(idx / width);

    const pxIdx = idx * 4;
    if (matchesStartColor(data[pxIdx], data[pxIdx + 1], data[pxIdx + 2], data[pxIdx + 3])) {
      data[pxIdx] = 0;
      data[pxIdx + 1] = 0;
      data[pxIdx + 2] = 0;
      data[pxIdx + 3] = 0;

      const neighbors = [[x + 1, y], [x - 1, y], [x, y + 1], [x, y - 1]];
      for (const [nx, ny] of neighbors) {
        if (nx >= 0 && nx < width && ny >= 0 && ny < height) {
          const nIdx = ny * width + nx;
          if (visited[nIdx] === 0) {
            visited[nIdx] = 1;
            queue[tail++] = nIdx;
          }
        }
      }
    }
  }

  ctx.putImageData(imageData, 0, 0);
};

const processImageBgRemoval = (srcUrl, mode, tolerance, clickedPoint) => {
  return new Promise((resolve, reject) => {
    if (mode === 'none' && !clickedPoint) {
      resolve(srcUrl);
      return;
    }

    const img = new Image();
    img.crossOrigin = 'anonymous';
    img.onload = () => {
      const canvas = document.createElement('canvas');
      canvas.width = img.width;
      canvas.height = img.height;
      const ctx = canvas.getContext('2d');
      if (!ctx) {
        reject(new Error('Could not get 2D context'));
        return;
      }
      ctx.drawImage(img, 0, 0);

      if (clickedPoint) {
        const cx = Math.floor(clickedPoint.x * img.width);
        const cy = Math.floor(clickedPoint.y * img.height);
        if (cx >= 0 && cx < img.width && cy >= 0 && cy < img.height) {
          removeBackgroundFromClick(canvas, cx, cy, tolerance);
        }
      }

      if (mode === 'edge') {
        removeBackgroundBFS(canvas, tolerance);
      } else if (mode === 'global') {
        removeBackgroundGlobal(canvas, tolerance);
      }

      resolve(canvas.toDataURL('image/png'));
    };

    img.onerror = () => reject(new Error('Image failed to load for background removal'));
    img.src = srcUrl;
  });
};

/* ============================================================
 * geminiService
 * ============================================================ */
const fileToGenerativePart = (file) => {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onloadend = () => {
      const base64String = String(reader.result).split(',')[1];
      resolve({
        inlineData: { data: base64String, mimeType: file.type },
      });
    };
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
};

const PRO_MODEL = 'gemini-3-pro-image-preview';
const FLASH_MODEL = 'gemini-2.5-flash-image';

const sleep = (ms) => new Promise((resolve) => setTimeout(resolve, ms));

const generateGhostMannequin = async (
  imageFile,
  promptText,
  viewType,
  referenceImage = null,
  referenceImage2 = null,
  rightImageFile = null,
  customApiKey
) => {
  const apiKey = customApiKey;
  if (!apiKey) {
    throw new Error('API Key가 설정되지 않았습니다. 우측 상단에서 설정해주세요.');
  }

  const ai = new GoogleGenAI({ apiKey });

  let parts = [];
  const typeLower = viewType.toLowerCase();
  const isSideView = typeLower.includes('side') || typeLower.includes('측면');
  const isBackView = typeLower.includes('back') || typeLower.includes('후면');

  let viewSpecificInstruction = '';
  let preamble = '';

  if (isSideView) {
    if (referenceImage) parts.push(await fileToGenerativePart(referenceImage));
    if (referenceImage2) parts.push(await fileToGenerativePart(referenceImage2));
    if (imageFile) parts.push(await fileToGenerativePart(imageFile));
    if (rightImageFile) parts.push(await fileToGenerativePart(rightImageFile));

    const hasLeft = !!imageFile;
    const hasRight = !!rightImageFile;
    let partIndex = 1;
    let inputMapping = '';

    if (referenceImage) inputMapping += `- Image ${partIndex++}: [MASTER_SHAPE_1] The FIXED geometry/composition template 1 (Source for WRINKLES, FOLDS, SHAPE).\n`;
    if (referenceImage2) inputMapping += `- Image ${partIndex++}: [MASTER_SHAPE_2] The FIXED geometry/composition template 2.\n`;
    if (hasLeft) inputMapping += `- Image ${partIndex++}: [TEXTURE_A] Material/Pattern source for the LEFT side.\n`;
    if (hasRight) inputMapping += `- Image ${partIndex++}: [TEXTURE_B] Material/Pattern source for the RIGHT side.\n`;

    preamble = 'You are a STRICT Texture Mapping Engine. You are NOT a creative generator. You must perform a pixel-level texture swap.';

    viewSpecificInstruction = `
      ### UNCOMPROMISING ARCHITECTURAL DIRECTIVE: SKIN VS. SKELETON SEPARATION ###

      INPUTS:
      ${inputMapping}

      YOUR CORE OPERATING PRINCIPLE:
      You are performing a "Digital Skin Graft". You must treat Shape and Surface as two entirely independent data streams that NEVER influence each other's domain.

      1. **DOMAIN: SHAPE (SKELETON) - SOURCE: [MASTER_SHAPE] ONLY**
         - **EXCLUSIVITY**: 100% of the output's Geometry, Silhouette, Pose, Fit, Folds, and Wrinkles MUST come from [MASTER_SHAPE].
         - **IGNORE**: Completely disregard the silhouette, drape, or shape of the clothes in [TEXTURE_A] and [TEXTURE_B]. They are ONLY color/material buckets.
         - **INVARIANT**: If the output shows a wrinkle that was in [TEXTURE_A] but NOT in [MASTER_SHAPE], you have failed.
         - **INVARIANT**: If the output fit (e.g. waist width) deviates from [MASTER_SHAPE] to match [TEXTURE_A], you have failed.

      2. **DOMAIN: SURFACE (SKIN) - SOURCE: [TEXTURE_A] & [TEXTURE_B] ONLY**
         - **EXCLUSIVITY**: 100% of the output's Color, Material Texture (grain, weave), and Design Patterns (logos, stripes) MUST come from [TEXTURE_A] (left) and [TEXTURE_B] (right).
         - **IGNORE**: Completely disregard the color and texture of the original object in [MASTER_SHAPE]. It is a blank geometric mold.
         - **MAPPING**: Wrap the "skin" from [TEXTURES] onto the "skeleton" of [MASTER_SHAPE].

      3. **DOMAIN: VOLUME (LIGHTING) - SOURCE: [MASTER_SHAPE] ONLY**
         - Use the light direction, highlights, and shadow-maps from [MASTER_SHAPE] to give the final object its 3D depth.
         - This ensures the texture looks like it naturally belongs to the template's specific folds.

      ### FINAL CHECKLIST BEFORE GENERATION ###
      - Did I keep the template's wrinkles? (MUST BE YES)
      - Did I keep the template's fit/silhouette? (MUST BE YES)
      - Is the design/color exactly from the clothing images? (MUST BE YES)
      - Did any shape from the clothing images leak into the result? (MUST BE NO)

      Produce a high-fidelity merge that looks like [TEXTURES] was manufactured as a exact copy of the garment in [MASTER_SHAPE].
    `;
  } else {
    preamble = "Create a perfectly aligned, straight, and high-quality professional 'Ghost Mannequin' (invisible mannequin) product image.";

    if (imageFile) parts.push(await fileToGenerativePart(imageFile));
    if (referenceImage) parts.push(await fileToGenerativePart(referenceImage));

    let inputMapping = `- Image 1: [SUBJECT_IMAGE] The clothing item on a mannequin/model that needs to be processed.\n`;
    if (referenceImage) {
      inputMapping += `- Image 2: [STYLE_REFERENCE] Additional details or texture reference.\n`;
    }

    const zipperInstruction = `
      **STYLING RULE - ZIPPERS & CLOSURES (MANDATORY)**:
      - If the garment has a zipper, buttons, or any front closure, it MUST be generated **FULLY CLOSED/ZIPPED UP TO THE TOP**.
      - Even if the source image is open, you must reconstruct it as if it is fully zipped/buttoned.
      - The collar should stand up naturally as it does when fully zipped.
      - DO NOT leave the jacket or shirt open.
    `;

    if (isBackView) {
      viewSpecificInstruction = `
        STRICT REQUIREMENT: PERFECTLY STRAIGHT, NON-TILTED, & SYMMETRICAL BACK VIEW.
        TARGET: A highly technical, professional orthographic rear view product shot.

        RULES:
        1. **CAMERA ANGLE**: EXACTLY 0 DEGREES. Dead center, perfectly flat. No high or low angle.
        2. **SYMMETRY**: Shoulders, sleeves, and hem MUST be perfectly symmetrical horizontally.
        3. **ALIGNMENT**: The garment MUST be perfectly vertical. Zero degree tilt. The spine line must be a perfect vertical axis.
        4. **COLLAR**: ${zipperInstruction} (The back collar must look structured, upright, and centered).
        5. **CONTENT**: If input is Front, generate the BACK with the same style/texture.
      `;
    } else {
      viewSpecificInstruction = `
        STRICT REQUIREMENT: PERFECTLY STRAIGHT & SYMMETRICAL FRONT VIEW.
        TARGET: A professional, centered, orthographic front view ghost mannequin shot.

        RULES:
        1. **CAMERA ANGLE**: 0 DEGREES. Dead center. No perspective distortion.
        2. **ALIGNMENT**: Straighten any tilt from the source. The garment must be perfectly vertical.
        3. **SYMMETRY**: Ensure shoulders are perfectly level and symmetrical.
        4. **PRIMARY OBJECT**: Remove mannequin/model from [SUBJECT_IMAGE].
        5. **NECK/INNER**: Reconstruct the inner neck realistically and symmetrically.
        6. ${zipperInstruction}
        7. **STYLE**: Preserve logos, pockets, and textures with perfect clarity.
      `;
    }

    viewSpecificInstruction += `\nINPUTS:\n${inputMapping}`;
  }

  const finalPrompt = `
    ${preamble}

    ${viewSpecificInstruction}

    General Quality Rules:
    1. Remove any visible mannequin, model, hands, or body parts.
    2. Background: Transparent (or pure white if transparency fails).
    3. Lighting: Soft, professional studio lighting.
    4. Resolution: High, crisp details.

    ${promptText ? `User additional request: ${promptText}` : ''}
  `;

  parts.push({ text: finalPrompt });

  const constructParts = () => parts;

  const tryGenerateWithRetry = async (modelName, maxRetries = 2) => {
    let lastError = null;
    const isPro = modelName === PRO_MODEL;

    const config = {
      imageConfig: { aspectRatio: '3:4' },
    };
    if (isPro) {
      config.imageConfig.imageSize = '2K';
    }

    for (let attempt = 0; attempt <= maxRetries; attempt++) {
      try {
        console.log(`Attempt ${attempt + 1} for ${modelName}...`);

        const response = await ai.models.generateContent({
          model: modelName,
          contents: { parts: constructParts() },
          config,
        });

        for (const part of response.candidates?.[0]?.content?.parts || []) {
          if (part.inlineData) {
            return `data:image/png;base64,${part.inlineData.data}`;
          }
        }
        throw new Error(`No image generated from ${modelName}`);
      } catch (error) {
        lastError = error;
        const errorMsg = error.message || JSON.stringify(error);

        if (errorMsg.includes('API key not valid')) {
          throw new Error('API Key가 유효하지 않습니다. 우측 상단의 설정 버튼을 눌러 올바른 키를 입력해주세요.');
        }

        if (errorMsg.includes('prepayment credits are depleted') || errorMsg.includes('billing') || errorMsg.includes('RESOURCES_EXHAUSTED')) {
          throw new Error('Google AI Studio의 선불 크레딧이 모두 소진되었습니다. AI Studio(https://ai.studio/projects)에서 프로젝트 및 결제 수단을 확인하고 크레딧을 충전해주세요.');
        }

        const isRetryable = errorMsg.includes('503') || errorMsg.includes('429') || errorMsg.includes('Deadline') || errorMsg.includes('UNAVAILABLE');

        if (isRetryable && attempt < maxRetries) {
          const waitTime = Math.pow(2, attempt) * 2000;
          console.warn(`Attempt ${attempt + 1} failed for ${modelName}. Retrying in ${waitTime}ms... Error: ${errorMsg}`);
          await sleep(waitTime);
          continue;
        }

        throw error;
      }
    }
    throw lastError;
  };

  try {
    return await tryGenerateWithRetry(PRO_MODEL);
  } catch (error) {
    console.warn(`Pro model failed: ${error.message}`);
    const errorMsg = error.message || JSON.stringify(error);
    const isQuotaOrServerIssue =
      errorMsg.includes('429') ||
      errorMsg.includes('RESOURCE_EXHAUSTED') ||
      errorMsg.includes('503') ||
      errorMsg.includes('UNAVAILABLE') ||
      errorMsg.includes('Deadline');

    if (isQuotaOrServerIssue) {
      console.log('Pro model unavailable or quota exceeded. Attempting fallback to Flash model...');
      try {
        return await tryGenerateWithRetry(FLASH_MODEL);
      } catch (fallbackError) {
        console.error('Flash model fallback failed:', fallbackError);
        const fbMsg = fallbackError.message || '';
        if (fbMsg.includes('크레딧') || fbMsg.includes('AI Studio')) {
          throw fallbackError;
        }
        throw new Error('서버 부하가 심하거나 할당량이 초과되었습니다. 잠시 후 다시 시도해주시거나 결제 상태를 확인해주세요.');
      }
    }

    throw error;
  }
};

/* ============================================================
 * ApiKeySelector — standalone HTML version
 * (AI Studio 환경이 아니므로 키를 직접 입력받아 localStorage에 저장)
 * ============================================================ */
const API_KEY_STORAGE = 'ghost_mannequin_api_key';

const ApiKeySelector = ({ onKeySelected }) => {
  const [hasKey, setHasKey] = useState(false);
  const [showInput, setShowInput] = useState(false);
  const [manualKey, setManualKey] = useState('');

  useEffect(() => {
    const stored = localStorage.getItem(API_KEY_STORAGE);
    if (stored) {
      setHasKey(true);
      onKeySelected(stored);
    }
    // eslint-disable-next-line react-hooks/exhaustive-deps
  }, []);

  const handleSave = () => {
    const key = manualKey.trim();
    if (!key) return;
    localStorage.setItem(API_KEY_STORAGE, key);
    setHasKey(true);
    setShowInput(false);
    setManualKey('');
    onKeySelected(key);
  };

  const handleClear = () => {
    localStorage.removeItem(API_KEY_STORAGE);
    setHasKey(false);
    setShowInput(true);
  };

  return (
    <div className="relative">
      {hasKey && !showInput ? (
        <div className="flex items-center gap-2">
          <div className="flex items-center gap-2 text-sm text-green-600 bg-green-50 px-3 py-1.5 rounded-full border border-green-200">
            <Key size={14} />
            <span>API Key 활성화됨</span>
          </div>
          <button
            onClick={() => setShowInput(true)}
            className="p-2 text-slate-400 hover:text-blue-600 hover:bg-blue-50/60 rounded-lg transition-colors"
            title="API Key 변경"
          >
            <Settings size={18} />
          </button>
        </div>
      ) : !showInput ? (
        <button
          onClick={() => setShowInput(true)}
          className="flex items-center gap-2 bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-lg text-sm font-medium transition-colors shadow-sm animate-pulse"
        >
          <Key size={16} />
          <span>API Key 설정 (필수)</span>
        </button>
      ) : null}

      {showInput && (
        <div className="absolute right-0 top-full mt-2 w-80 bg-white border border-slate-200 rounded-xl shadow-lg p-4 z-50 space-y-3">
          <div className="flex items-center justify-between">
            <span className="text-sm font-bold text-slate-800">Gemini API Key 입력</span>
            <button onClick={() => setShowInput(false)} className="text-slate-400 hover:text-slate-700">
              <X size={16} />
            </button>
          </div>
          <input
            type="password"
            value={manualKey}
            onChange={(e) => setManualKey(e.target.value)}
            onKeyDown={(e) => e.key === 'Enter' && handleSave()}
            placeholder="AIza... 형식의 키를 붙여넣으세요"
            className="w-full px-3 py-2 text-sm border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
            autoFocus
          />
          <p className="text-[11px] text-slate-400 leading-snug">
            키는 이 브라우저(localStorage)에만 저장되며 Google API 호출에만 사용됩니다.{' '}
            <a href="https://aistudio.google.com/apikey" target="_blank" rel="noreferrer" className="text-blue-600 underline">AI Studio에서 키 발급 ↗</a>
          </p>
          <div className="flex gap-2">
            <button
              onClick={handleSave}
              disabled={!manualKey.trim()}
              className={`flex-1 flex items-center justify-center gap-1.5 py-2 rounded-lg text-sm font-bold transition-colors ${
                manualKey.trim() ? 'bg-blue-600 hover:bg-blue-700 text-white' : 'bg-slate-100 text-slate-400 cursor-not-allowed'
              }`}
            >
              <Check size={14} /> 저장
            </button>
            {hasKey && (
              <button
                onClick={handleClear}
                className="px-3 py-2 rounded-lg text-sm font-bold text-red-600 border border-red-200 hover:bg-red-50 transition-colors"
              >
                키 삭제
              </button>
            )}
          </div>
        </div>
      )}
    </div>
  );
};

/* ============================================================
 * App
 * ============================================================ */
const App = () => {
  const [selectedImage, setSelectedImage] = useState(null);
  const [previewUrl, setPreviewUrl] = useState(null);

  const [refImage, setRefImage] = useState(null);
  const [refPreviewUrl, setRefPreviewUrl] = useState(null);

  const [ref2Image, setRef2Image] = useState(null);
  const [ref2PreviewUrl, setRef2PreviewUrl] = useState(null);

  const [rightImage, setRightImage] = useState(null);
  const [rightPreviewUrl, setRightPreviewUrl] = useState(null);

  const [rawGeneratedImageUrl, setRawGeneratedImageUrl] = useState(null);
  const [bgRemovalMode, setBgRemovalMode] = useState('edge');
  const [bgTolerance, setBgTolerance] = useState(15);
  const [clickedPoints, setClickedPoints] = useState([]);
  const [isBgProcessing, setIsBgProcessing] = useState(false);

  const [generatedImageUrl, setGeneratedImageUrl] = useState(null);

  const [history, setHistory] = useState([]);

  useEffect(() => {
    try {
      const stored = localStorage.getItem('ghost_mannequin_history');
      if (stored) setHistory(JSON.parse(stored));
    } catch (e) {
      console.error('Failed to load history:', e);
    }
  }, []);

  useEffect(() => {
    if (generatedImageUrl && rawGeneratedImageUrl && history.length > 0) {
      const latest = history[0];
      if (latest.rawUrl === rawGeneratedImageUrl && latest.url !== generatedImageUrl) {
        setHistory((prev) => {
          if (prev.length === 0) return prev;
          const copy = [...prev];
          copy[0] = { ...copy[0], url: generatedImageUrl };
          try {
            localStorage.setItem('ghost_mannequin_history', JSON.stringify(copy));
          } catch (e) {
            console.error('Failed to save history to localStorage:', e);
          }
          return copy;
        });
      }
    }
  }, [generatedImageUrl, rawGeneratedImageUrl]);

  useEffect(() => {
    if (!rawGeneratedImageUrl) {
      setGeneratedImageUrl(null);
      return;
    }

    const process = async () => {
      setIsBgProcessing(true);
      try {
        let result = rawGeneratedImageUrl;

        if (clickedPoints.length > 0) {
          for (const pt of clickedPoints) {
            result = await processImageBgRemoval(result, 'none', bgTolerance, pt);
          }
        }

        if (bgRemovalMode !== 'none') {
          result = await processImageBgRemoval(result, bgRemovalMode, bgTolerance);
        }

        setGeneratedImageUrl(result);
      } catch (err) {
        console.error('Error isolating background:', err);
      } finally {
        setIsBgProcessing(false);
      }
    };

    const timer = setTimeout(() => {
      process();
    }, 150);

    return () => clearTimeout(timer);
  }, [rawGeneratedImageUrl, bgRemovalMode, bgTolerance, clickedPoints]);

  const [prompt, setPrompt] = useState('');
  const [viewType, setViewType] = useState(ViewType.FRONT);
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState(null);
  const [hasApiKey, setHasApiKey] = useState(false);
  const [customApiKey, setCustomApiKey] = useState(undefined);

  const [isDragging, setIsDragging] = useState(false);
  const [isDraggingRef, setIsDraggingRef] = useState(false);
  const [isDraggingRef2, setIsDraggingRef2] = useState(false);
  const [isDraggingRight, setIsDraggingRight] = useState(false);

  const fileInputRef = useRef(null);
  const refFileInputRef = useRef(null);
  const ref2FileInputRef = useRef(null);
  const rightFileInputRef = useRef(null);

  // --- Main Image Handlers ---
  const processFile = (file) => {
    if (!file.type.startsWith('image/')) {
      setError('이미지 파일만 업로드 가능합니다.');
      return;
    }
    setSelectedImage(file);
    setPreviewUrl(URL.createObjectURL(file));
    setRawGeneratedImageUrl(null);
    setGeneratedImageUrl(null);
    setClickedPoints([]);
    setError(null);
  };

  const handleImageUpload = (e) => {
    const file = e.target.files?.[0];
    if (file) processFile(file);
  };
  const handleDragOver = (e) => { e.preventDefault(); setIsDragging(true); };
  const handleDragLeave = (e) => { e.preventDefault(); setIsDragging(false); };
  const handleDrop = (e) => {
    e.preventDefault();
    setIsDragging(false);
    const file = e.dataTransfer.files?.[0];
    if (file) processFile(file);
  };
  const clearImage = () => {
    setSelectedImage(null);
    setPreviewUrl(null);
    setRawGeneratedImageUrl(null);
    setGeneratedImageUrl(null);
    setClickedPoints([]);
    if (fileInputRef.current) fileInputRef.current.value = '';
  };

  // --- Reference Image Handlers ---
  const processRefFile = (file) => {
    if (!file.type.startsWith('image/')) {
      setError('이미지 파일만 업로드 가능합니다.');
      return;
    }
    setRefImage(file);
    setRefPreviewUrl(URL.createObjectURL(file));
  };
  const handleRefImageUpload = (e) => {
    const file = e.target.files?.[0];
    if (file) processRefFile(file);
  };
  const handleRefDragOver = (e) => { e.preventDefault(); setIsDraggingRef(true); };
  const handleRefDragLeave = (e) => { e.preventDefault(); setIsDraggingRef(false); };
  const handleRefDrop = (e) => {
    e.preventDefault();
    setIsDraggingRef(false);
    const file = e.dataTransfer.files?.[0];
    if (file) processRefFile(file);
  };
  const clearRefImage = () => {
    setRefImage(null);
    setRefPreviewUrl(null);
    if (refFileInputRef.current) refFileInputRef.current.value = '';
  };

  // --- Reference Image 2 Handlers ---
  const processRef2File = (file) => {
    if (!file.type.startsWith('image/')) {
      setError('이미지 파일만 업로드 가능합니다.');
      return;
    }
    setRef2Image(file);
    setRef2PreviewUrl(URL.createObjectURL(file));
  };
  const handleRef2ImageUpload = (e) => {
    const file = e.target.files?.[0];
    if (file) processRef2File(file);
  };
  const handleRef2DragOver = (e) => { e.preventDefault(); setIsDraggingRef2(true); };
  const handleRef2DragLeave = (e) => { e.preventDefault(); setIsDraggingRef2(false); };
  const handleRef2Drop = (e) => {
    e.preventDefault();
    setIsDraggingRef2(false);
    const file = e.dataTransfer.files?.[0];
    if (file) processRef2File(file);
  };
  const clearRef2Image = () => {
    setRef2Image(null);
    setRef2PreviewUrl(null);
    if (ref2FileInputRef.current) ref2FileInputRef.current.value = '';
  };

  // --- Right Image Handlers ---
  const processRightFile = (file) => {
    if (!file.type.startsWith('image/')) {
      setError('이미지 파일만 업로드 가능합니다.');
      return;
    }
    setRightImage(file);
    setRightPreviewUrl(URL.createObjectURL(file));
  };
  const handleRightImageUpload = (e) => {
    const file = e.target.files?.[0];
    if (file) processRightFile(file);
  };
  const handleRightDragOver = (e) => { e.preventDefault(); setIsDraggingRight(true); };
  const handleRightDragLeave = (e) => { e.preventDefault(); setIsDraggingRight(false); };
  const handleRightDrop = (e) => {
    e.preventDefault();
    setIsDraggingRight(false);
    const file = e.dataTransfer.files?.[0];
    if (file) processRightFile(file);
  };
  const clearRightImage = () => {
    setRightImage(null);
    setRightPreviewUrl(null);
    if (rightFileInputRef.current) rightFileInputRef.current.value = '';
  };

  // --- Generation Handler ---
  const handleGenerate = async () => {
    if (!selectedImage) {
      setError('작업을 진행하려면 의류 원본 이미지를 업로드해주세요.');
      return;
    }
    if (!hasApiKey) {
      setError('작업을 시작하려면 API Key를 먼저 선택해주세요.');
      return;
    }

    setLoading(true);
    setError(null);

    try {
      const result = await generateGhostMannequin(
        selectedImage,
        prompt,
        viewType,
        refImage,
        ref2Image,
        rightImage,
        customApiKey
      );

      setRawGeneratedImageUrl(result);
      setClickedPoints([]);

      const newItem = {
        id: Date.now().toString(),
        url: result,
        rawUrl: result,
        viewType,
        prompt: prompt || `${viewType === ViewType.FRONT ? '정면' : viewType === ViewType.BACK ? '후면' : '측면'} 변환`,
        timestamp: Date.now(),
      };
      setHistory((prev) => {
        const updated = [newItem, ...prev];
        try {
          localStorage.setItem('ghost_mannequin_history', JSON.stringify(updated));
        } catch (e) {
          console.error('Failed to save history:', e);
        }
        return updated;
      });
    } catch (err) {
      setError(err.message || '이미지 생성 중 오류가 발생했습니다.');
    } finally {
      setLoading(false);
    }
  };

  const handleSelectHistoryItem = (item) => {
    setRawGeneratedImageUrl(item.rawUrl);
    setGeneratedImageUrl(item.url);
    setViewType(item.viewType);
    setClickedPoints([]);
    setPrompt(item.prompt || '');
  };

  const handleDeleteHistoryItem = (id, e) => {
    e.stopPropagation();
    setHistory((prev) => {
      const updated = prev.filter((item) => item.id !== id);
      try {
        localStorage.setItem('ghost_mannequin_history', JSON.stringify(updated));
      } catch (err) {
        console.error('Failed to save history after delete:', err);
      }
      return updated;
    });
  };

  const handleDownloadHistoryItem = (item, e) => {
    e.stopPropagation();
    const link = document.createElement('a');
    link.href = item.url;
    link.download = `ghost-mannequin-history-${item.id}.png`;
    document.body.appendChild(link);
    link.click();
    document.body.removeChild(link);
  };

  const handleDownload = () => {
    if (generatedImageUrl) {
      const link = document.createElement('a');
      link.href = generatedImageUrl;
      link.download = `ghost-mannequin-${Date.now()}.png`;
      document.body.appendChild(link);
      link.click();
      document.body.removeChild(link);
    }
  };

  const handleImageClick = (e) => {
    if (!generatedImageUrl || bgRemovalMode === 'none') return;
    const rect = e.currentTarget.getBoundingClientRect();
    const x = (e.clientX - rect.left) / rect.width;
    const y = (e.clientY - rect.top) / rect.height;
    setClickedPoints((prev) => [...prev, { x, y }]);
  };

  const handleUndoClick = () => setClickedPoints((prev) => prev.slice(0, -1));
  const handleResetClicks = () => setClickedPoints([]);

  const isSideView = viewType === ViewType.SIDE;

  return (
    <div className="min-h-screen bg-slate-50 text-slate-900 pb-20">
      {/* Header */}
      <header className="bg-white border-b border-slate-200 sticky top-0 z-50 backdrop-blur-md bg-white/95 shadow-sm">
        <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-16 flex items-center justify-between">
          <div className="flex items-center gap-2.5">
            <h1 className="text-xl font-black text-slate-950 tracking-tight">
              싸카스포츠 평면컷-&gt;고스트마네킹
            </h1>
          </div>
          <ApiKeySelector
            onKeySelected={(key) => {
              setHasApiKey(true);
              setCustomApiKey(key);
            }}
          />
        </div>
      </header>

      <main className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
        {/* Intro */}
        <div className="mb-8 text-center sm:text-left flex flex-col sm:flex-row sm:items-center justify-between gap-4 bg-gradient-to-r from-slate-100/80 via-slate-50/50 to-transparent p-6 rounded-2xl border border-slate-200/60">
          <div>
            <h2 className="text-3xl font-extrabold text-slate-900 tracking-tight mb-2">E-Biz업무 고스트 이미지 생성</h2>
            <p className="text-slate-600 text-sm max-w-2xl leading-relaxed">
              평면 스튜디오 바닥컷 입체형 고스트 마네킹으로 변환 프로그램
            </p>
          </div>
          <div className="hidden md:flex items-center gap-2 bg-white px-4 py-2.5 rounded-xl border border-slate-200/80 shadow-xs text-xs font-semibold text-slate-900">
            <span className="w-2 h-2 rounded-full bg-slate-950 animate-pulse"></span>
            <span>Gemini Nano-Banana Pro 지원</span>
          </div>
        </div>

        <div className="grid grid-cols-1 lg:grid-cols-2 gap-8">
          {/* Left Column: Input */}
          <div className="space-y-6">
            {/* View Type Selector */}
            <div className="bg-white p-6 rounded-2xl shadow-sm border border-slate-100">
              <div className="flex items-center mb-4">
                <span className="text-[11px] font-bold text-slate-900 bg-slate-100 px-2.5 py-1 rounded-full border border-slate-200">지구 구도 자동 인식</span>
              </div>
              <div className="grid grid-cols-3 gap-3">
                <button
                  onClick={() => setViewType(ViewType.FRONT)}
                  className={`flex flex-col items-center justify-center p-3 rounded-xl border-2 transition-all cursor-pointer ${
                    viewType === ViewType.FRONT
                      ? 'border-slate-950 bg-slate-950 text-white shadow-sm'
                      : 'border-slate-100 hover:border-slate-300 text-slate-500 bg-slate-50/50 hover:bg-white'
                  }`}
                >
                  <span className="font-bold text-sm sm:text-base">정면 제품컷</span>
                  <span className="text-[10px] sm:text-xs opacity-75">(Front View)</span>
                </button>
                <button
                  onClick={() => setViewType(ViewType.SIDE)}
                  className={`flex flex-col items-center justify-center p-3 rounded-xl border-2 transition-all cursor-pointer ${
                    viewType === ViewType.SIDE
                      ? 'border-slate-950 bg-slate-950 text-white shadow-sm'
                      : 'border-slate-100 hover:border-slate-300 text-slate-500 bg-slate-50/50 hover:bg-white'
                  }`}
                >
                  <span className="font-bold text-sm sm:text-base">측면 제품컷</span>
                  <span className="text-[10px] sm:text-xs opacity-75">(Side View)</span>
                </button>
                <button
                  onClick={() => setViewType(ViewType.BACK)}
                  className={`flex flex-col items-center justify-center p-3 rounded-xl border-2 transition-all cursor-pointer ${
                    viewType === ViewType.BACK
                      ? 'border-slate-950 bg-slate-950 text-white shadow-sm'
                      : 'border-slate-100 hover:border-slate-300 text-slate-500 bg-slate-50/50 hover:bg-white'
                  }`}
                >
                  <span className="font-bold text-sm sm:text-base">후면 제품컷</span>
                  <span className="text-[10px] sm:text-xs opacity-75">(Back View)</span>
                </button>
              </div>
            </div>

            {/* Image Upload Area */}
            <div className="bg-white p-6 rounded-2xl shadow-sm border border-slate-100">
              <div className={`grid gap-4 ${isSideView ? 'grid-cols-1 sm:grid-cols-2 lg:grid-cols-1 xl:grid-cols-2' : 'grid-cols-1'}`}>
                {/* 1. Main Image Upload */}
                <div className={isSideView ? 'xl:col-span-1' : ''}>
                  <div className="flex justify-between items-center mb-2">
                    <label className="block text-sm font-bold text-slate-800">
                      {isSideView ? '의류 이미지 (좌측면/단독)' : '의류 원본 이미지'}
                    </label>
                    {selectedImage && (
                      <button onClick={clearImage} className="text-xs text-red-500 hover:text-red-700 flex items-center gap-1 font-semibold">
                        <Trash2 size={12} /> 삭제
                      </button>
                    )}
                  </div>

                  <div
                    onDragOver={handleDragOver}
                    onDragLeave={handleDragLeave}
                    onDrop={handleDrop}
                    className={`relative border-2 border-dashed rounded-xl transition-all h-64 sm:h-56 xl:h-64 flex flex-col items-center justify-center overflow-hidden ${

                        ? 'border-slate-950 bg-slate-50 ring-4 ring-slate-150'
                        : previewUrl
                        ? 'border-slate-200 bg-slate-50'
                        : 'border-slate-300 hover:border-slate-950 hover:bg-slate-50/50'
                    }`}
                  >
                    {previewUrl ? (
                      <img src={previewUrl} alt="Preview" className="w-full h-full object-contain p-4" />

                          <Upload size={20} />
                        </div>
                        <p className="text-sm font-semibold text-slate-700">
                          {isDragging ? '놓으세요!' : '의류 사진 추가/드래그'}
                        </p>
                      </div>
                    )}
                    <input

                      accept="image/*"
                      onChange={handleImageUpload}
                      className="absolute inset-0 w-full h-full opacity-0 cursor-pointer"
                    />
                  </div>
                </div>

                {isSideView && (
                  <div>
                    <div className="flex justify-between items-center mb-2">

                      <input

                {isSideView && (

                            ? 'border-slate-950 bg-slate-50 ring-4 ring-slate-150'

                            ? 'border-slate-200 bg-slate-50'
                            : 'border-slate-300 hover:border-slate-950 hover:bg-slate-50'
                        }`}
                      >

                            <div className="w-12 h-12 rounded-full flex items-center justify-center mx-auto mb-3 bg-slate-100 text-slate-600">
                              <ImageIcon size={20} />
                            </div>
                            <p className="text-sm font-semibold text-slate-700">참고 1</p>

                        <input
                          ref={refFileInputRef}
                          type="file"
                          accept="image/*"
                          onChange={handleRefImageUpload}
                          className="absolute inset-0 w-full h-full opacity-0 cursor-pointer"

                      </div>
                    </div>
                    <div className="lg:col-span-1">
                      <div className="flex justify-between items-center mb-2">
                        <label className="block text-sm font-bold text-slate-800">템플릿 참조 이미지 2</label>

                          <button onClick={clearRef2Image} className="text-xs text-red-500 hover:text-red-700 flex items-center gap-1 font-semibold">

                          </button>
                        )}
                      </div>
                      <div
                        onDragOver={handleRef2DragOver}
                        onDragLeave={handleRef2DragLeave}
                        onDrop={handleRef2Drop}
                        className={`relative border-2 border-dashed rounded-xl transition-all h-64 sm:h-56 flex flex-col items-center justify-center overflow-hidden ${
                          isDraggingRef2
                            ? 'border-slate-950 bg-slate-50 ring-4 ring-slate-150'
                            : ref2PreviewUrl
                            ? 'border-slate-200 bg-slate-50'
                            : 'border-slate-300 hover:border-slate-950 hover:bg-slate-50'
                        }`}
                      >
                        {ref2PreviewUrl ? (
                          <img src={ref2PreviewUrl} alt="Ref2 Preview" className="w-full h-full object-contain p-4" />
                        ) : (
                          <div className="text-center p-6">
                            <div className="w-12 h-12 rounded-full flex items-center justify-center mx-auto mb-3 bg-slate-100 text-slate-600">
                              <ImageIcon size={20} />
                            </div>
                            <p className="text-sm font-semibold text-slate-700">참고 2</p>
                          </div>
                        )}
                        <input
                          ref={ref2FileInputRef}
                          type="file"
                          accept="image/*"
                          onChange={handleRef2ImageUpload}
                          className="absolute inset-0 w-full h-full opacity-0 cursor-pointer"
                        />
                      </div>
                    </div>
                    <div className="sm:col-span-2 xl:col-span-2">
                      <p className="mt-2 text-[10px] text-slate-600 font-bold">
                        * 측면 뷰 가이드: 템플릿의 형태, 핏, 구도, 주름을 100% 유지하며 재질 및 디자인만 가상 변환합니다.
                      </p>
                    </div>
                  </>
                )}
              </div>
            </div>

            {/* Text Prompt & Reference Image */}
            <div className="bg-white rounded-2xl shadow-sm border border-slate-100 overflow-hidden">
              <div className="p-4 border-b border-slate-100 bg-slate-50/50">
                <label className="block text-sm font-bold text-slate-700">추가 수정 요청 사항 (선택)</label>
              </div>

              <div className="p-2">
                <textarea
                  value={prompt}
                  onChange={(e) => setPrompt(e.target.value)}
                  placeholder="예: 옷의 주름을 자연스럽게 펴주세요. 조명을 밝게 연출해주세요."
                  className="w-full p-3 bg-transparent text-slate-900 placeholder-slate-400 focus:outline-none resize-none text-base min-h-[100px]"
                />
              </div>

              {!isSideView && (
                <>
                  {refImage && (
                    <div className="px-4 pb-2">
                      <div className="relative inline-block group">
                        <img
                          src={refPreviewUrl || ''}
                          alt="Reference"
                          className="h-16 w-16 object-cover rounded-lg border border-slate-200 shadow-sm"
                        />
                        <button
                          onClick={clearRefImage}
                          className="absolute -top-2 -right-2 bg-white text-slate-500 hover:text-red-500 rounded-full p-1 border border-slate-200 shadow-sm opacity-0 group-hover:opacity-100 transition-opacity cursor-pointer"
                        >
                          <X size={12} />
                        </button>
                      </div>
                    </div>
                  )}

                  <div className="px-3 py-2 bg-slate-50 border-t border-slate-100 flex items-center justify-between">
                    <div className="flex items-center gap-2">
                      <input
                        ref={refFileInputRef}
                        type="file"
                        accept="image/*"
                        className="hidden"
                        id="ref-image-upload-toolbar"
                        onChange={handleRefImageUpload}
                      />
                      <label
                        htmlFor="ref-image-upload-toolbar"
                        className="flex items-center gap-1.5 px-3 py-1.5 text-xs font-bold text-slate-600 hover:text-slate-900 hover:bg-slate-100 rounded-lg cursor-pointer transition-colors"
                      >
                        <Paperclip size={14} />
                        {refImage ? '참고 이미지 변경' : '참고 이미지 첨부'}
                      </label>
                    </div>
                    <span className="text-xs text-slate-400 font-medium">{prompt.length} / 500</span>
                  </div>
                </>
              )}
              {isSideView && (
                <div className="px-3 py-2 bg-slate-50 border-t border-slate-100 flex items-center justify-end">
                  <span className="text-xs text-slate-400">{prompt.length} / 500</span>
                </div>
              )}
            </div>

            {/* Action Button */}
            <div className="space-y-2">
              <button
                onClick={handleGenerate}
                disabled={loading || !hasApiKey || !selectedImage}
                className={`w-full py-4 rounded-xl font-bold text-lg flex items-center justify-center gap-2 transition-all shadow-md active:scale-95 cursor-pointer ${
                  loading || !hasApiKey || !selectedImage
                    ? 'bg-slate-300 text-slate-500 cursor-not-allowed shadow-none transform-none'
                    : 'bg-slate-950 hover:bg-slate-900 text-white shadow-slate-200 hover:-translate-y-0.5'
                }`}
              >
                {loading ? (
                  <span>생성 중...</span>
                ) : (
                  <>
                    <Wand2 size={24} />
                    <span>고스트 마네킹 생성하기</span>
                  </>
                )}
              </button>
              {!hasApiKey && (
                <p className="text-center text-xs text-red-500 font-bold animate-pulse mt-2">
                  ↗ 우측 상단의 'API Key 설정' 버튼을 눌러 키를 설정해 주세요.
                </p>
              )}
            </div>

            {error && (
              <div className="p-4 bg-red-50 text-red-700 border border-red-200 rounded-xl text-sm break-words whitespace-pre-wrap">
                🚨 {error}
              </div>
            )}
          </div>

          {/* Right Column: Result */}
          <div className="flex flex-col h-full">
            <div className="bg-white p-6 rounded-2xl shadow-sm border border-slate-100 flex-grow flex flex-col h-[600px] lg:h-auto min-h-[500px]">
              <div className="flex justify-between items-center mb-4">
                <label className="block text-sm font-bold text-slate-800">결과 이미지</label>
                {generatedImageUrl && (
                  <span className="text-xs font-bold text-green-600 bg-green-50 px-2.5 py-1 rounded-full border border-green-150">
                    생성 완료
                  </span>
                )}
              </div>

              <div className="flex-grow bg-checkerboard rounded-xl border border-slate-200 overflow-hidden relative flex items-center justify-center min-h-[350px]">
                {loading ? (
                  <LoadingSpinner />
                ) : generatedImageUrl ? (
                  <div className="relative w-full h-full group flex items-center justify-center">
                    <img
                      src={generatedImageUrl}
                      alt="Generated Ghost Mannequin"
                      onClick={handleImageClick}
                      className={`w-full h-full object-contain ${bgRemovalMode !== 'none' ? 'cursor-crosshair' : ''}`}
                      title={bgRemovalMode !== 'none' ? '배경의 남아있는 흠집이나 그림자를 클릭하여 지우세요!' : '고스트 마네킹 결과 이미지'}
                    />
                    {isBgProcessing && (
                      <div className="absolute inset-0 bg-white/40 flex items-center justify-center backdrop-blur-[1px] transition-all">
                        <div className="bg-white/95 px-4 py-3 rounded-2xl shadow-lg border border-slate-150 text-xs font-bold text-slate-700 flex items-center gap-2">
                          <RefreshCw className="animate-spin w-4 h-4 text-slate-950" />
                          <span>배경 및 투명 누끼 처리 중...</span>
                        </div>
                      </div>
                    )}
                    {bgRemovalMode !== 'none' && (
                      <div className="absolute bottom-3 left-3 right-3 bg-slate-900/85 text-white text-[10px] px-3 py-1.5 rounded-lg pointer-events-none opacity-0 group-hover:opacity-100 transition-opacity text-center">
                        💡 옷 바깥쪽 배경에 남아있는 그림자나 노이즈가 있다면, 그 부분을 직접 클릭하여 제거할 수 있습니다.
                      </div>
                    )}
                  </div>
                ) : (
                  <div className="text-center text-slate-400">
                    <ImageIcon className="w-16 h-16 mx-auto mb-3 opacity-20" />
                    <p className="font-semibold text-sm">이미지가 여기에 표시됩니다</p>
                  </div>
                )}
              </div>

              {/* Background Separation Controls */}
              {rawGeneratedImageUrl && (
                <div className="mt-4 p-4 bg-slate-50/70 rounded-xl border border-slate-200/60 space-y-3.5">
                  <div className="flex items-center justify-between border-b border-slate-200/60 pb-2">
                    <div className="flex items-center gap-1.5 text-slate-800 font-bold text-sm">
                      <Scissors size={14} className="text-slate-950" />
                      <span>제품 배경 분리 & 누끼 설정</span>
                    </div>
                    {isBgProcessing ? (
                      <span className="text-xs text-slate-950 font-bold animate-pulse flex items-center gap-1">
                        <span className="w-1.5 h-1.5 bg-slate-950 rounded-full animate-ping"></span>
                        처리 중...
                      </span>
                    ) : (
                      <span className="text-[10px] text-emerald-600 font-bold bg-emerald-50 border border-emerald-100 px-1.5 py-0.5 rounded-full">
                        투명 처리 활성
                      </span>
                    )}
                  </div>

                  {/* Mode Selector */}
                  <div className="space-y-1">
                    <label className="block text-[11px] font-bold text-slate-500">배경 분리 모드</label>
                    <div className="grid grid-cols-3 gap-2">
                      <button
                        onClick={() => setBgRemovalMode('edge')}
                        className={`py-1.5 px-2 rounded-lg text-xs font-bold border transition-all cursor-pointer ${
                          bgRemovalMode === 'edge'
                            ? 'bg-slate-950 text-white border-slate-950 shadow-sm'
                            : 'bg-white text-slate-600 border-slate-200 hover:bg-slate-50'
                        }`}
                      >
                        자동 외곽 분리
                      </button>
                      <button
                        onClick={() => setBgRemovalMode('global')}
                        className={`py-1.5 px-2 rounded-lg text-xs font-bold border transition-all cursor-pointer ${
                          bgRemovalMode === 'global'
                            ? 'bg-slate-950 text-white border-slate-950 shadow-sm'
                            : 'bg-white text-slate-600 border-slate-200 hover:bg-slate-50'
                        }`}
                      >
                        전체 유사색 제거
                      </button>
                      <button
                        onClick={() => setBgRemovalMode('none')}
                        className={`py-1.5 px-2 rounded-lg text-xs font-bold border transition-all cursor-pointer ${
                          bgRemovalMode === 'none'
                            ? 'bg-slate-950 text-white border-slate-950 shadow-sm'
                            : 'bg-white text-slate-600 border-slate-200 hover:bg-slate-50'
                        }`}
                      >
                        원본 배경
                      </button>
                    </div>
                  </div>

                  {/* Tolerance Slider */}
                  {bgRemovalMode !== 'none' && (
                    <div className="space-y-1">
                      <div className="flex justify-between items-center text-xs border-slate-200">
                        <label className="font-bold text-slate-500 flex items-center gap-1">
                          <Sliders size={12} className="text-slate-400" />
                          <span>제거 감도 (Tolerance)</span>
                        </label>
                        <span className="font-bold text-slate-950 bg-slate-100 px-2 py-0.5 rounded text-[11px]">{bgTolerance}%</span>
                      </div>
                      <input
                        type="range"
                        min="2"
                        max="80"
                        value={bgTolerance}
                        onChange={(e) => setBgTolerance(Number(e.target.value))}
                        className="w-full h-1.5 bg-slate-200 rounded-lg appearance-none cursor-pointer accent-slate-950"
                      />
                      <p className="text-[10px] text-slate-400 leading-tight">
                        * 수치가 높을수록 더 넓은 경계가 제거됩니다. 제품 영역이 침범되면 수치를 낮춰보세요.
                      </p>
                    </div>
                  )}

                  {/* Click to remove list */}
                  {bgRemovalMode !== 'none' && (
                    <div className="flex flex-col gap-1 border-t border-slate-200/50 pt-2.5">
                      <div className="flex items-center justify-between text-[11px] text-slate-500">
                        <span className="flex items-center gap-1 font-bold">
                          <MousePointerClick size={12} className="text-slate-900" />
                          <span>클릭 누끼 보정 내역</span>
                        </span>
                        <span className="font-bold text-slate-700">{clickedPoints.length}개 클릭됨</span>
                      </div>
                      {clickedPoints.length > 0 && (
                        <div className="flex justify-end gap-1.5 mt-1">
                          <button
                            onClick={handleUndoClick}
                            className="text-[10px] hover:text-slate-950 font-bold flex items-center gap-1 px-2 py-1 bg-white border border-slate-200 rounded-lg text-slate-600 transition-all shadow-xs cursor-pointer"
                          >
                            <Undo size={10} /> 한 단계 취소
                          </button>
                          <button
                            onClick={handleResetClicks}
                            className="text-[10px] hover:bg-red-50 font-bold px-2 py-1 bg-white border border-slate-200 rounded-lg text-slate-600 transition-all shadow-xs cursor-pointer"
                          >
                            전체 취소
                          </button>
                        </div>
                      )}
                    </div>
                  )}
                </div>
              )}

              <div className="mt-6 flex gap-3">
                <button
                  onClick={handleDownload}
                  disabled={!generatedImageUrl}
                  className={`flex-1 flex items-center justify-center gap-2 py-3 rounded-xl font-bold transition-all cursor-pointer ${
                    generatedImageUrl
                      ? 'bg-slate-950 text-white hover:bg-slate-900 shadow-md shadow-slate-200 hover:-translate-y-0.5'
                      : 'bg-slate-100 text-slate-400 cursor-not-allowed'
                  }`}
                >
                  <Download size={18} />
                  다운로드 (PNG)
                </button>
                {generatedImageUrl && (
                  <button
                    onClick={() => handleGenerate()}
                    className="px-4 py-3 bg-slate-100 text-slate-600 rounded-xl hover:bg-slate-200 hover:text-slate-950 transition-colors cursor-pointer"
                    title="다시 생성하기"
                  >
                    <RefreshCw size={18} />
                  </button>
                )}
              </div>
            </div>

            <p className="text-center text-xs text-slate-400 mt-4 font-medium">
              * 생성된 이미지는 Nano Banana Pro 모델(Gemini 2.5/3 Pro Image)을 통해 제작되었습니다.
            </p>
          </div>
        </div>

        {/* Studio Workspace History & Gallery Shelf */}
        <div className="mt-12 pt-8 border-t border-slate-200/80">
          <div className="flex flex-col sm:flex-row sm:items-center justify-between gap-4 mb-6">
            <div>
              <h3 className="text-xl font-extrabold text-slate-900 flex items-center gap-2">
                <Sparkles className="text-slate-950 w-5 h-5 animate-pulse" />
                <span>작업 히스토리 및 워크스페이스 라이브러리</span>
              </h3>
              <p className="text-sm text-slate-500 mt-1">
                최근 생성된 마네킹컷 결과물 보관소입니다. 원하는 카드를 클릭하여 결과를 복원하거나 개별적으로 PNG 다운로드할 수 있습니다.
              </p>
            </div>
            {history.length > 0 && (
              <button
                onClick={() => {
                  if (confirm('정말 모든 변환 히스토리를 삭제하시겠습니까?')) {
                    setHistory([]);
                    localStorage.removeItem('ghost_mannequin_history');
                  }
                }}
                className="inline-flex items-center gap-1.5 px-3 py-1.5 text-xs font-bold text-red-600 hover:text-white hover:bg-red-600 border border-red-200 rounded-lg transition-all cursor-pointer"
              >
                <Trash2 size={13} /> 히스토리 전체삭제
              </button>
            )}
          </div>

          {history.length === 0 ? (
            <div className="bg-white rounded-2xl border border-slate-150 p-10 text-center text-slate-400 font-medium shadow-xs">
              <Shirt className="mx-auto w-12 h-12 text-slate-200 mb-3" />
              <span>현재 보관된 파일 변환 히스토리가 없습니다. 고스트 마네킹을 생성하면 여기에 자동 보관됩니다.</span>
            </div>
          ) : (
            <div className="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 xl:grid-cols-6 gap-4">
              {history.map((item) => (
                <div
                  key={item.id}
                  onClick={() => handleSelectHistoryItem(item)}
                  className="bg-white rounded-xl border border-slate-200 p-2 shadow-xs hover:shadow-md transition-all group relative flex flex-col justify-between cursor-pointer hover:border-slate-400"
                >
                  <div className="relative aspect-[3/4] bg-checkerboard rounded-lg overflow-hidden flex items-center justify-center border border-slate-100">
                    <img
                      src={item.url}
                      alt="History mannequin"
                      className="max-h-full max-w-full object-contain p-1"
                      referrerPolicy="no-referrer"
                    />
                    <div className="absolute inset-0 bg-slate-900/40 opacity-0 group-hover:opacity-100 transition-opacity flex flex-col items-center justify-center p-2 text-center">
                      <span className="text-[10px] font-bold text-white bg-slate-950 px-2 py-1 rounded shadow-md">
                        결과 복원하기
                      </span>
                    </div>
                    <span className="absolute top-1 left-1 px-1.5 py-0.5 rounded text-[9px] font-bold bg-slate-900/75 text-white capitalize">
                      {item.viewType === ViewType.FRONT ? '정면 뷰' : item.viewType === ViewType.BACK ? '후면 뷰' : '측면 뷰'}
                    </span>
                  </div>

                  <div className="mt-2 space-y-1">
                    <div className="text-[9px] text-slate-400 flex justify-between items-center px-1 font-mono">
                      <span>{new Date(item.timestamp).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })}</span>
                      <button
                        onClick={(e) => handleDeleteHistoryItem(item.id, e)}
                        className="text-red-500 hover:text-red-700 p-0.5 rounded hover:bg-red-50 cursor-pointer"
                        title="히스토리에서 삭제"
                      >
                        <X size={10} />
                      </button>
                    </div>

                    <div className="pt-1.5 border-t border-slate-100 flex items-center justify-between gap-1">
                      <span className="text-[10px] font-semibold text-slate-600 truncate max-w-[70px]">{item.prompt}</span>
                      <button
                        onClick={(e) => handleDownloadHistoryItem(item, e)}
                        className="text-[10px] text-slate-950 hover:text-white hover:bg-slate-950 border border-slate-200 px-1.5 py-0.5 rounded font-semibold transition-all flex items-center gap-0.5 cursor-pointer"
                        title="PNG 다운로드"
                      >
                        <Download size={10} />
                        <span>PNG</span>
                      </button>
                    </div>
                  </div>
                </div>
              ))}
            </div>
          )}
        </div>
      </main>
    </div>
  );
};

const rootElement = document.getElementById('root');
const root = ReactDOM.createRoot(rootElement);
root.render(<App />);
    </script>
  </body>
</html>
